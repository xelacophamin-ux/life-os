<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life OS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Life OS</title>
<style>
:root {
  --bg: #F2F2F7; --card: #FFFFFF; --text: #000000;
  --sec: rgba(60,60,67,.6); --sep: #C6C6C8;
  --blue: #007AFF; --red: #FF3B30; --green: #34C759; --orange: #FF9500;
  --mac-bg: #ECECEC; --mac-side: #F5F5F7; --mac-text2: #6E6E73;
  --st: env(safe-area-inset-top,0px); --sb: env(safe-area-inset-bottom,0px);
  --sl: env(safe-area-inset-left,0px); --sr: env(safe-area-inset-right,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#F2F2F7;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',Helvetica,sans-serif}
#app{height:100%;width:100%;position:relative}

/* ── MOBILE SHELL ── */
.sh-m{display:flex;flex-direction:column;height:100%;background:var(--bg)}
.nav{position:fixed;top:0;left:0;right:0;
  height:54px;padding-top:0;
  background:rgba(242,242,247,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:.5px solid var(--sep);display:flex;align-items:center;
  padding-left:16px;padding-right:16px;z-index:200;gap:8px}
.nav-title{font-size:17px;font-weight:600;flex:1;text-align:center}
.nav-back{color:var(--blue);font-size:17px;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;gap:2px;font-family:inherit;padding:8px 0;min-width:64px}
.nav-back::before{content:'‹';font-size:24px;line-height:1}
.nav-right{color:var(--blue);font-size:17px;background:none;border:none;cursor:pointer;
  font-family:inherit;padding:8px 0;min-width:64px;text-align:right}
/* wrap fills shell; screen is repositioned so content never hides behind nav/tab-bar */
.wrap{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;top:64px;left:0;right:0;bottom:58px;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.screen.slide-out{transform:translateX(-30%);transition:transform .3s ease;pointer-events:none}
.screen.slide-in{transform:translateX(100%)}
.screen.slide-in.active{transform:translateX(0);transition:transform .3s ease}
.tab-bar{position:fixed;bottom:0;left:0;right:0;
  height:58px;padding-bottom:0;
  background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:.5px solid var(--sep);display:flex;align-items:stretch;z-index:200}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;padding:10px 0;color:var(--sec);font-size:10px;font-weight:500;position:relative}
.tab.on{color:var(--blue)}
.tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab-dot{position:absolute;top:6px;right:calc(50% - 16px);width:6px;height:6px;border-radius:50%;background:var(--blue)}
.fab-settings{position:fixed;top:12px;right:16px;z-index:210;background:none;
  border:none;cursor:pointer;color:var(--blue);width:30px;height:30px;
  display:flex;align-items:center;justify-content:center}
.a2hs-banner{position:fixed;left:8px;right:8px;bottom:57px;z-index:300;
  background:rgba(0,0,0,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:#fff;padding:12px 14px;border-radius:14px;display:none;
  font-size:13px;line-height:1.4;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.a2hs-banner.show{display:flex;align-items:center;gap:10px}
.a2hs-banner-text{flex:1}
.a2hs-banner-text b{font-weight:600}
.a2hs-banner-close{background:none;border:none;color:#fff;opacity:.6;font-size:18px;
  cursor:pointer;padding:0 4px;line-height:1}
/* PWA standalone (home screen icon): full safe-area support top + bottom */
@media(display-mode:standalone){
  .nav{height:calc(54px + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px)}
  .screen{top:calc(64px + env(safe-area-inset-top,0px));bottom:calc(58px + env(safe-area-inset-bottom,0px) + 20px)}
  .tab-bar{height:calc(58px + env(safe-area-inset-bottom,0px) + 20px);padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px)}
  .fab-settings{top:calc(env(safe-area-inset-top,0px) + 12px)}
  .rte-kb-toolbar{bottom:calc(58px + env(safe-area-inset-bottom,0px) + 20px)}
}
/* JS-detected standalone (more reliable on iOS than media query) */
html.ios-standalone .nav{height:calc(54px + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px)}
html.ios-standalone .screen{top:calc(64px + env(safe-area-inset-top,0px));bottom:calc(58px + env(safe-area-inset-bottom,0px) + 20px)}
html.ios-standalone .tab-bar{height:calc(58px + env(safe-area-inset-bottom,0px) + 20px);padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px)}
html.ios-standalone .fab-settings{top:calc(env(safe-area-inset-top,0px) + 12px)}
html.ios-standalone .rte-kb-toolbar{bottom:calc(58px + env(safe-area-inset-bottom,0px) + 20px)}

/* ── DESKTOP SHELL ── */
@media(min-width:768px){
  .sh-m{display:none!important}
  .sh-d{display:flex;flex-direction:row;height:100%;background:var(--mac-bg)}
  .sidebar{width:240px;min-width:240px;height:100%;background:var(--mac-side);
    border-right:1px solid rgba(0,0,0,.12);display:flex;flex-direction:column;padding:20px 0 12px;overflow-y:auto}
  .side-hd{font-size:11px;font-weight:700;color:var(--mac-text2);text-transform:uppercase;
    letter-spacing:.5px;padding:0 16px 8px}
  .side-item{display:flex;align-items:center;gap:10px;padding:7px 14px;margin:1px 8px;border-radius:7px;
    cursor:pointer;color:var(--text);font-size:14px;transition:background .1s;user-select:none}
  .side-item:hover:not(.on){background:rgba(0,0,0,.06)}
  .side-item.on{background:var(--blue);color:#fff}
  .side-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .side-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .side-sp{flex:1}
  .side-div{height:1px;background:rgba(0,0,0,.1);margin:8px 16px}
  .cpanel{flex:1;height:100%;overflow:hidden;background:var(--card);position:relative}
  .tab-bar{display:none!important}
  .fab-settings{display:none!important}
  .nav{display:none!important}
  .wrap{padding:0!important}
  .screen{position:static;height:100%;transform:none!important}
}
@media(max-width:767px){.sh-d{display:none!important}}

/* ── SHARED SECTION HIDE/SHOW ── */
.sec{display:none;height:100%;overflow:auto}
.sec.on{display:block}

/* ── iOS LIST ── */
.grp{margin:20px 16px 0}
.grp-hd{font-size:13px;color:var(--sec);text-transform:uppercase;letter-spacing:.3px;
  padding:0 4px 8px}
.lst{background:var(--card);border-radius:10px;overflow:hidden}
.lrow{display:flex;align-items:center;padding:11px 16px;min-height:44px;position:relative;
  cursor:pointer;transition:background .1s;gap:12px}
.lrow:active{background:rgba(0,0,0,.05)}
.lrow+.lrow::before{content:'';position:absolute;top:0;left:16px;right:0;height:.5px;background:var(--sep)}
.lrow-txt{flex:1;font-size:17px;color:var(--text)}
.lrow-sec{font-size:17px;color:var(--sec)}
.chevron{color:var(--sec);font-size:17px;margin-left:8px}
.chevron::after{content:'›'}

/* ── TOGGLE ── */
.toggle{appearance:none;-webkit-appearance:none;width:51px;height:31px;border-radius:16px;
  background:#E5E5EA;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;width:27px;height:27px;border-radius:50%;background:#fff;
  top:2px;left:2px;transition:transform .2s;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.toggle:checked{background:var(--green)}
.toggle:checked::after{transform:translateX(20px)}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:flex-end}
.overlay.center{align-items:center;justify-content:center}
.sheet{background:var(--bg);border-radius:13px 13px 0 0;width:100%;max-height:92vh;
  overflow-y:auto;padding-bottom:calc(20px + var(--sb));animation:su .3s ease}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--sep);margin:10px auto 14px}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:768px){
  .overlay{background:rgba(0,0,0,.35);backdrop-filter:blur(4px);align-items:center;justify-content:center}
  .sheet{border-radius:12px;width:90%;max-width:600px;box-shadow:0 10px 40px rgba(0,0,0,.18);
    animation:mi .2s ease}
  @keyframes mi{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
}

/* ── BUTTONS ── */
.btn{border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-blue{background:var(--blue);color:#fff;border-radius:10px;padding:13px 20px;font-size:17px;font-weight:500;width:100%}
.btn-blue:active{opacity:.8}
.btn-red{background:none;color:var(--red);font-size:17px;width:100%;padding:12px 0;text-align:center}
.btn-gray{background:#E5E5EA;color:var(--text);border-radius:8px;padding:8px 16px;font-size:15px}

/* macOS buttons */
@media(min-width:768px){
  .btn-blue{border-radius:6px;padding:6px 16px;font-size:13px;width:auto}
  .btn-gray{border-radius:6px;padding:6px 14px;font-size:13px}
}

/* ── SEGMENTED CONTROL ── */
.seg{display:flex;background:rgba(118,118,128,.12);border-radius:8px;padding:2px;margin:12px 16px}
.seg-btn{flex:1;padding:6px 0;border:none;border-radius:6px;font-size:13px;font-weight:500;
  background:transparent;color:var(--text);cursor:pointer;transition:all .15s;font-family:inherit}
.seg-btn.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* ── SPINNER ── */
.spin{width:24px;height:24px;border:2.5px solid rgba(0,122,255,.3);border-top-color:var(--blue);
  border-radius:50%;animation:ro .8s linear infinite;display:inline-block}
@keyframes ro{to{transform:rotate(360deg)}}

/* ══════════════════════════════════════════════
   FRAME — NOTES STYLE
══════════════════════════════════════════════ */
.notes-folder-hd{padding:24px 16px 8px;background:var(--card);border-bottom:.5px solid var(--sep)}
.notes-folder-title{font-size:34px;font-weight:700}
.notes-folder-sub{font-size:14px;color:var(--sec);margin-top:2px}
.notes-list{background:var(--card)}
.notes-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;cursor:pointer;
  position:relative;transition:background .1s}
.notes-item:active{background:var(--bg)}
.notes-item+.notes-item::before{content:'';position:absolute;top:0;left:60px;right:0;height:.5px;background:var(--sep)}
.notes-icon{font-size:28px;line-height:1;margin-top:3px;width:36px;text-align:center;flex-shrink:0}
.notes-info{flex:1;min-width:0}
.notes-title{font-size:17px;font-weight:600;margin-bottom:2px}
.notes-preview{display:flex;gap:6px;align-items:baseline}
.notes-date{font-size:14px;color:var(--sec);white-space:nowrap}
.notes-snip{font-size:14px;color:var(--sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notes-chev{color:var(--sep);font-size:20px;align-self:center;margin-left:auto}

/* Note body */
.note-body{padding:16px;background:var(--card);min-height:100%}
.note-big-title{font-size:28px;font-weight:700;color:var(--text);width:100%;border:none;
  background:transparent;outline:none;font-family:inherit;margin-bottom:12px;line-height:1.2;resize:none}
.note-divider{height:.5px;background:var(--sep);margin:0 0 12px}

/* Checklist */
.chk-item{display:flex;align-items:flex-start;gap:12px;padding:5px 0;position:relative}
.chk-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--sep);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .15s}
.chk-circle.on{background:var(--orange);border-color:var(--orange);color:#fff;font-size:12px}
.chk-circle.on::after{content:'✓'}
.chk-text{flex:1;font-size:17px;line-height:1.5;outline:none;border:none;background:transparent;
  font-family:inherit;color:var(--text);min-width:0;resize:none;padding:0}
.chk-text.on{text-decoration:line-through;color:var(--sec)}
.chk-del{background:none;border:none;color:var(--sep);font-size:20px;cursor:pointer;padding:0 4px;
  line-height:1;opacity:0;transition:opacity .15s}
.chk-item:hover .chk-del{opacity:1}
.add-line{display:flex;align-items:center;gap:12px;padding:8px 0;cursor:pointer;
  color:var(--blue);font-size:17px;background:none;border:none;font-family:inherit;width:100%}
.add-circle{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

/* Plain text note */
.txt-line{font-size:17px;line-height:1.7;color:var(--text);width:100%;border:none;background:transparent;
  outline:none;font-family:inherit;resize:none;min-height:28px;display:block}
.txt-line::placeholder{color:var(--sep)}

/* ── RICH TEXT EDITOR ── */
.rte-wrap{display:flex;flex-direction:column}
.rte-body{padding:14px 16px 160px;outline:none;font-size:17px;line-height:1.7;color:var(--text);
  word-break:break-word;min-height:200px}
.rte-body:empty::before{content:'Commencez à écrire…';color:rgba(60,60,67,.25);pointer-events:none}
.rte-body h1{font-size:24px;font-weight:700;line-height:1.2;margin:14px 0 4px;letter-spacing:-.3px}
.rte-body h2{font-size:20px;font-weight:600;line-height:1.3;margin:10px 0 4px;letter-spacing:-.2px}
.rte-body ul,.rte-body ol{padding-left:22px;margin:4px 0}
.rte-body li{margin:2px 0;line-height:1.6}
.rte-body blockquote{border-left:3px solid var(--sep);margin:6px 0;padding:0 14px;color:var(--sec)}
.rte-body table{border-collapse:collapse;width:100%;margin:10px 0;font-size:15px}
.rte-body td,.rte-body th{border:1px solid var(--sep);padding:6px 10px}
.rte-body th{background:var(--bg);font-weight:600;font-size:13px;color:var(--sec);text-align:left}
.rte-body input[type=checkbox]{width:16px;height:16px;margin-right:8px;vertical-align:middle;
  accent-color:var(--orange);pointer-events:all;cursor:pointer}
/* Desktop inline toolbar */
.rte-toolbar{display:flex;align-items:center;gap:1px;padding:5px 8px;
  background:rgba(255,255,255,.97);border-top:.5px solid var(--sep);overflow-x:auto;
  scrollbar-width:none;flex-shrink:0;position:sticky;bottom:0;z-index:20}
.rte-toolbar::-webkit-scrollbar{display:none}
@media(max-width:767px){.rte-toolbar{display:none!important}}
/* Global floating keyboard toolbar (mobile) */
.rte-kb-toolbar{position:fixed;left:0;right:0;bottom:49px;z-index:250;
  display:none;align-items:center;padding:0 6px;height:44px;
  background:rgba(249,249,249,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:.5px solid var(--sep);overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none}
.rte-kb-toolbar.active{display:flex}
.rte-kb-toolbar::-webkit-scrollbar{display:none}
.rte-sep{width:.5px;height:20px;background:var(--sep);margin:0 5px;flex-shrink:0}
.rtb{min-width:34px;height:34px;border:none;border-radius:7px;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit;font-size:14px;
  color:var(--text);padding:0 4px;transition:background .1s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent}
.rtb:active{background:rgba(0,0,0,.08)}
.rtb svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.rtb-b{font-weight:700;font-size:16px}
.rtb-i{font-style:italic;font-size:16px}
.rtb-u{text-decoration:underline;font-size:16px}
/* Note icon edit */
.note-icon-edit{font-size:48px;text-align:center;padding:20px 0 6px;cursor:pointer;line-height:1;
  display:block;width:100%;border:none;background:transparent;-webkit-tap-highlight-color:transparent}
.note-icon-hint{text-align:center;font-size:11px;color:var(--sec);margin-bottom:8px}

/* Sport table */
.sport-tbl{width:100%;border-collapse:collapse;margin:8px 0;font-size:15px}
.sport-tbl th{background:#F2F2F7;padding:7px 10px;border:1px solid var(--sep);font-size:13px;
  font-weight:600;color:var(--sec);text-align:left}
.sport-tbl td{padding:7px 10px;border:1px solid var(--sep);color:var(--text)}
.tbl-sub{font-size:15px;font-weight:700;color:var(--text);margin:14px 0 6px}
.tbl-input{width:100%;border:none;background:transparent;outline:none;resize:none;font-family:inherit;
  font-size:15px;color:var(--text);line-height:1.5;padding:0;min-height:22px}
.row-del{background:none;border:none;color:var(--sep);font-size:18px;cursor:pointer;padding:2px 8px;
  -webkit-tap-highlight-color:transparent;line-height:1;flex-shrink:0;opacity:.6;transition:opacity .15s}
.row-del:active{opacity:1;color:var(--red)}
.row-del-tbl{padding:0;width:32px;font-size:16px}
.ana-row{display:flex;align-items:flex-start;gap:8px;padding:3px 0;position:relative}
.ana-bullet{color:var(--sec);font-size:18px;line-height:1.4;padding-top:2px;flex-shrink:0;width:14px;text-align:center}
.ana-input{flex:1;border:none;background:transparent;outline:none;resize:none;font-family:inherit;
  font-size:16px;color:var(--text);line-height:1.5;padding:2px 0;min-height:24px}
.pers-block{margin-bottom:18px}
.pers-name-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;margin-bottom:4px}
.pers-name-input{flex:1;border:none;background:transparent;outline:none;resize:none;font-family:inherit;
  font-size:19px;font-weight:700;color:var(--text);line-height:1.3;padding:0;min-height:26px;letter-spacing:-.2px}
.pers-trait-row{display:flex;align-items:flex-start;gap:6px;padding:3px 0 3px 8px;position:relative}
.pers-trait-bullet{color:var(--sec);font-size:16px;line-height:1.5;padding-top:2px;flex-shrink:0}
.pers-trait-input{flex:1;border:none;background:transparent;outline:none;resize:none;font-family:inherit;
  font-size:16px;color:var(--text);line-height:1.5;padding:2px 0;min-height:24px}
.add-line-sub{padding-left:8px;color:var(--sec);font-size:14px}

/* Personnalités */
.pers-name{font-size:19px;font-weight:700;margin:8px 0 6px}
.pers-trait{font-size:16px;color:var(--text);padding:3px 0 3px 20px;position:relative}
.pers-trait::before{content:'—';position:absolute;left:0;color:var(--sec)}

/* Analysis */
.ana-hd{font-size:15px;font-weight:700;margin:14px 0 6px}
.ana-item{font-size:16px;padding:3px 0 3px 20px;position:relative;color:var(--text)}
.ana-item::before{content:'•';position:absolute;left:6px;color:var(--sec)}

/* Desktop 3-col Notes */
@media(min-width:768px){
  .notes-d{display:flex;height:100%}
  .nd-folders{width:190px;border-right:1px solid var(--sep);background:var(--mac-side);padding:16px 0;overflow-y:auto}
  .nd-title-bar{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--sep)}
  .td{width:13px;height:13px;border-radius:50%}
  .td-r{background:#FF5F57}.td-y{background:#FEBC2E}.td-g{background:#28C840}
  .nd-folder-item{padding:7px 14px;cursor:pointer;border-radius:6px;margin:2px 8px;font-size:14px;
    display:flex;align-items:center;gap:8px;color:var(--text);transition:background .1s}
  .nd-folder-item.on{background:rgba(0,122,255,.15);color:var(--blue)}
  .nd-folder-item:not(.on):hover{background:rgba(0,0,0,.05)}
  .nd-list{width:280px;border-right:1px solid var(--sep);overflow-y:auto}
  .nd-content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .note-big-title{font-size:30px}
}

/* ══════════════════════════════════════════════
   LOG
══════════════════════════════════════════════ */
.log-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
  background:var(--card);border-bottom:.5px solid var(--sep);position:sticky;top:0;z-index:10;gap:12px}
.log-nav-btn{color:var(--blue);font-size:20px;background:none;border:none;cursor:pointer;
  padding:4px 10px;font-family:inherit;font-weight:300}

<script>
/* ================================================================
   LIFE OS — Single-file PWA
   ================================================================ */

// ── PWA SETUP ──────────────────────────────────────────────────
(function(){
  const ico='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23000"/><text y="62" x="50" text-anchor="middle" font-size="36" font-family="-apple-system,sans-serif" font-weight="700" fill="white">LOS</text></svg>';
  const m={name:"Life OS",short_name:"LOS",start_url:"./",display:"standalone",
    background_color:"#000",theme_color:"#000",
    icons:[{src:ico,sizes:"any",type:"image/svg+xml"}]};
  const b=new Blob([JSON.stringify(m)],{type:'application/json'});
  const u=URL.createObjectURL(b);
  const l=document.createElement('link');l.rel='manifest';l.href=u;document.head.appendChild(l);
  const aicon=document.createElement('link');aicon.rel='apple-touch-icon';aicon.href=ico;document.head.appendChild(aicon);
  // Unregister any existing service worker + purge all caches.
  // The SW was causing stale-content issues; offline persistence is now handled by the sync server.
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister())).catch(()=>{});
    if(window.caches)caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{});
  }
})();

// ── STORAGE ────────────────────────────────────────────────────
const S={
  get(k,d=null){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d}catch{return d}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));if(!k.startsWith('sync_')&&typeof Sync!=='undefined')Sync.schedulePush()}catch(e){console.warn(e)}},
  del(k){localStorage.removeItem(k);if(!k.startsWith('sync_')&&typeof Sync!=='undefined')Sync.schedulePush()},
  keys(){return Object.keys(localStorage)},
  clear(){localStorage.clear()},
  bytes(){try{return JSON.stringify(localStorage).length}catch{return 0}}
};

// ── CROSS-DEVICE SYNC ──────────────────────────────────────────
const Sync={
  url(){return (S.get('sync_url','')||'').replace(/\/$/,'')},
  token(){return S.get('sync_token','')||''},
  enabled(){return !!(this.url()&&this.token())},
  status(){return S.get('sync_status','idle')},
  setStatus(s){S.set('sync_status',s);const el=document.getElementById('sync-badge');if(el)el.textContent=this._label(s)},
  _label(s){return({idle:'',pushing:'⟳ envoi…',pulling:'⟳ réception…',ok:'✓ synchronisé',error:'⚠ erreur sync',offline:'hors ligne'})[s]||''},
  _timer:null,
  schedulePush(){
    if(!this.enabled())return;
    clearTimeout(this._timer);
    this._timer=setTimeout(()=>this.push().catch(()=>{}),2000);
  },
  async push(){
    if(!this.enabled())return false;
    this.setStatus('pushing');
    const ts=Date.now();
    const data={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k.startsWith('sync_'))continue;
      data[k]=localStorage.getItem(k);
    }
    try{
      const r=await fetch(this.url()+'/api/data',{
        method:'PUT',
        headers:{'Authorization':'Bearer '+this.token(),'Content-Type':'application/json'},
        body:JSON.stringify({lastUpdated:ts,data})
      });
      if(!r.ok){this.setStatus('error');return false}
      const j=await r.json();
      if(j.ok){S.set('sync_last_updated',String(ts));this.setStatus('ok');return true}
      this.setStatus('error');return false;
    }catch(e){this.setStatus('offline');return false}
  },
  async pull(){
    if(!this.enabled())return false;
    this.setStatus('pulling');
    try{
      const r=await fetch(this.url()+'/api/data',{
        headers:{'Authorization':'Bearer '+this.token()}
      });
      if(!r.ok){this.setStatus('error');return false}
      const remote=await r.json();
      const localTs=parseInt(S.get('sync_last_updated','0'));
      const remoteTs=remote.lastUpdated||0;
      if(remoteTs>localTs&&remote.data){
        // MERGE: apply remote keys without clearing local ones
        // This preserves keys that haven't been pushed yet (e.g. API keys typed
        // moments before quitting, before the 2s debounced push could fire).
        Object.keys(remote.data).forEach(k=>{
          if(k.startsWith('sync_'))return;
          localStorage.setItem(k,remote.data[k]);
        });
        S.set('sync_last_updated',String(remoteTs));
        this.setStatus('ok');
        return true;
      }
      this.setStatus('ok');
      return false;
    }catch(e){this.setStatus('offline');return false}
  }
};

// ── DATE UTILS ─────────────────────────────────────────────────
const D={
  key(d){const x=d instanceof Date?d:new Date(d);return `${x.getFullYear()}-${p2(x.getMonth()+1)}-${p2(x.getDate())}`},
  monthKey(d){const x=d instanceof Date?d:new Date(d);return `${x.getFullYear()}-${p2(x.getMonth()+1)}`},
  frenchLong(d){const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;},
  frenchMonthYear(d){const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    return `${months[d.getMonth()]} ${d.getFullYear()}`;},
  frenchMini(d){const months=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
    return `${months[d.getMonth()]} ${d.getFullYear()}`;},
  dayNames:['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'],
  dayNamesFull:['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'],
  isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear()},
  isSameDay(a,b){return a.getDate()===b.getDate()&&a.getMonth()===b.getMonth()&&a.getFullYear()===b.getFullYear()},
  addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r},
  addMonths(d,n){const r=new Date(d);r.setMonth(r.getMonth()+n);return r},
  monday(d){const r=new Date(d);const day=r.getDay();const diff=day===0?-6:1-day;r.setDate(r.getDate()+diff);return r},
  weekDates(d){const m=D.monday(d);return Array.from({length:7},(_,i)=>D.addDays(m,i))},
  monthDates(d){const first=new Date(d.getFullYear(),d.getMonth(),1);
    const last=new Date(d.getFullYear(),d.getMonth()+1,0);
    const start=D.monday(first);const dates=[];let cur=new Date(start);
    while(cur<=last||cur.getMonth()===d.getMonth()){dates.push(new Date(cur));cur=D.addDays(cur,1);if(dates.length>42)break}
    return dates;}
};
function p2(n){return String(n).padStart(2,'0')}

const SLOTS=(()=>{const a=[];for(let h=6;h<=23;h++)for(let m=0;m<60;m+=30){if(h===23&&m===30)continue;a.push(`${p2(h)}:${p2(m)}`)}return a})();

  get(date){const k=`log_${D.key(date)}`;const s=S.get(k,null);return s||SLOTS.map(t=>({time:t,text:''}))},
  set(date,time,text){const k=`log_${D.key(date)}`;const d=this.get(date);const slot=d.find(s=>s.time===time);if(slot){slot.text=text;S.set(k,d)}},
  hasContent(date){return this.get(date).some(s=>s.text.trim())},
  count(date){return this.get(date).filter(s=>s.text.trim()).length},

const Cal={
  clientId(){return S.get('google_client_id','')},
  token(){return S.get('google_token',null)},
  expiry(){return S.get('google_token_expiry',null)},
  valid(){const t=this.token();const e=this.expiry();return!!(t&&(!e||Date.now()<e))},
  startOAuth(){
    const cid=this.clientId();
    if(!cid){alert('Configurez votre Google OAuth Client ID dans les Paramètres.');return;}
    const scope='https://www.googleapis.com/auth/calendar.readonly';
    const redir=(location.origin+location.pathname).replace(/\/$/,'');
    const url=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(cid)}&redirect_uri=${encodeURIComponent(redir)}&response_type=token&scope=${encodeURIComponent(scope)}`;
    window.location.href=url;},
  handleCallback(){
    const h=window.location.hash.substring(1);if(!h)return false;
    const p=new URLSearchParams(h);const t=p.get('access_token');const exp=p.get('expires_in');
    if(t){S.set('google_token',t);S.set('google_token_expiry',Date.now()+parseInt(exp||'3600')*1000);
      S.set('last_cal_sync',new Date().toISOString());
      history.replaceState({},'',location.pathname);return true;}
    return false;},
  async fetchRange(start,end){
    if(!this.valid())return null;
    const tm=start.toISOString();const tM=end.toISOString();
    const url=`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(tm)}&timeMax=${encodeURIComponent(tM)}&orderBy=startTime&singleEvents=true&maxResults=250`;
    try{
      const r=await fetch(url,{headers:{'Authorization':`Bearer ${this.token()}`}});
      if(r.status===401){S.del('google_token');S.del('google_token_expiry');return null;}
      const data=await r.json();const items=data.items||[];
      // cache by day
      const byDay={};
      for(const ev of items){const s=ev.start?.dateTime||ev.start?.date;if(s){const dk=s.substring(0,10);(byDay[dk]=byDay[dk]||[]).push(ev);}}
      for(const[dk,evs]of Object.entries(byDay))S.set(`calendar_cache_${dk}`,evs);
      S.set('last_cal_sync',new Date().toISOString());
      return items;}
    catch(e){console.error('Cal fetch:',e);return [];}},
  cached(date){return S.get(`calendar_cache_${D.key(date)}`,[])},
  cachedRange(start,end){
    const evs=[];let d=new Date(start);
    while(d<=end){evs.push(...this.cached(d));d=D.addDays(d,1);}
    return evs;},
  evColors:['#1a73e8','#0F9D58','#F4B400','#DB4437','#7986CB','#33B679','#039BE5','#E67C73','#8D6E63']
};

5/ OBJECTIFS & SUCCÈS — avancement réel sur les Goals cochés ou non. Mentionner les succès enregistrés sur la période — ce qu'ils disent du momentum.
6/ VERDICT — deux phrases sèches : niveau d'exécution + l'unique levier prioritaire pour demain.

Aucune flatterie. Aucune suggestion non sollicitée sauf insights brefs sur la productivité, le mindset (référence à Elon Musk, John D. Rockefeller, ou autre entrepreneur à succès pertinent) ou pattern comportemental clairement identifié.`;

// ── GARMIN INTEGRATION ─────────────────────────────────────────
const Garmin={
  // Cache the last fetched data in localStorage so recaps always have something
  // even if the server is unreachable.
  cached(){return S.get('garmin_data',null)},
  fetchedAt(){return parseInt(S.get('garmin_fetched_at','0'))||0},
  async refresh(){
    if(!Sync.enabled())return null;
    try{
      const r=await fetch(Sync.url()+'/api/garmin',{headers:{'Authorization':'Bearer '+Sync.token()}});
      if(!r.ok)return null;
      const data=await r.json();
      S.set('garmin_data',data);
      S.set('garmin_fetched_at',String(Date.now()));
      return data;
    }catch(e){return null}
  },
  // Build a human-readable summary for the Claude recap prompt
  promptSummary(){
    const d=this.cached();if(!d)return '';
    const lines=[];
    if(d.sleep){
      const h=d.sleep.duration_hours;const score=d.sleep.score;
      lines.push(`Sommeil: ${h?h+'h':'?'} ${score?`(score ${score}/100)`:''}`);
      if(d.sleep.deep_seconds)lines.push(`  - sommeil profond: ${Math.round(d.sleep.deep_seconds/60)} min`);
      if(d.sleep.rem_seconds)lines.push(`  - REM: ${Math.round(d.sleep.rem_seconds/60)} min`);
    }
    if(d.body_battery){
      const bb=d.body_battery;
      lines.push(`Body Battery: actuel ${bb.current||'?'} (min ${bb.min||'?'} / max ${bb.max||'?'}, chargé +${bb.charged||0}, drainé -${bb.drained||0})`);
    }
    if(d.training_readiness){
      const t=d.training_readiness;
      lines.push(`Training Readiness: ${t.score||'?'}/100 — ${t.level||''} — "${t.feedback_short||t.feedback_long||''}"`);
      if(t.recovery_time)lines.push(`  - récupération recommandée: ${t.recovery_time}h`);
    }
    if(d.hrv){
      lines.push(`HRV: ${d.hrv.last_night_avg||'?'}ms (${d.hrv.status||'?'}) — "${d.hrv.feedback_phrase||''}"`);
    }
    if(d.stress){
      lines.push(`Stress moyen jour: ${d.stress.avg||'?'} (max ${d.stress.max||'?'})`);
    }
    if(d.training_status){
      lines.push(`Statut entraînement: ${d.training_status.status||'?'} — VO2 max ${d.training_status.vo2_max||'?'}`);
    }
    if(d.steps){
      lines.push(`Pas: ${d.steps.total||0}/${d.steps.goal||10000}`);
    }
    if(d.last_activity){
      const a=d.last_activity;const dur=a.duration_seconds?Math.round(a.duration_seconds/60):0;
      lines.push(`Dernière activité: ${a.type||'?'} — ${a.name||''} — ${dur} min, ${Math.round((a.distance_meters||0)/100)/10} km, ${a.calories||0} kcal`);
    }
    if(lines.length===0)return '';
    return '\n=== GARMIN (corps & récupération) ===\n'+lines.join('\n')+'\n';
  }
};

// ── SUCCESS LOG ────────────────────────────────────────────────
const Success={
  get(){return S.get('success_entries',[])||[]},
  // Sorted by timestamp DESC (most recent first)
  getSorted(){return this.get().slice().sort((a,b)=>b.ts-a.ts)},
  save(arr){S.set('success_entries',arr)},
  add(text,emoji='🏆',ts){
    const arr=this.get();
    arr.unshift({id:uid(),ts:ts||Date.now(),text:text||'',emoji});
    this.save(arr);
  },
  remove(id){this.save(this.get().filter(e=>e.id!==id))},
  updateText(id,text){
    const arr=this.get();const e=arr.find(x=>x.id===id);
    if(e){e.text=text;this.save(arr);}
  },
  updateEmoji(id,emoji){
    const arr=this.get();const e=arr.find(x=>x.id===id);
    if(e){e.emoji=emoji;this.save(arr);}
  },
  updateDate(id,iso){
    if(!iso)return false;
    // iso is "YYYY-MM-DD" — keep current time-of-day so the entry stays
    // chronologically stable within the same day
    const arr=this.get();const e=arr.find(x=>x.id===id);if(!e)return false;
    const cur=new Date(e.ts);
    const [y,m,d]=iso.split('-').map(Number);
    if(!y||!m||!d)return false;
    const nd=new Date(y,m-1,d,cur.getHours(),cur.getMinutes(),cur.getSeconds());
    if(isNaN(nd.getTime()))return false;
    e.ts=nd.getTime();this.save(arr);return true;
  },
  // Items in a date range (inclusive of both ends)
  rangeText(start,end){
    const s=start.getTime();const e=new Date(end);e.setHours(23,59,59,999);
    const eTs=e.getTime();
    return this.getSorted().filter(x=>x.ts>=s&&x.ts<=eTs);
  }
};

const Recap={
  save(type,dateObj,content){
    const ts=Date.now();
    const dk=type==='month'?D.monthKey(dateObj):D.key(dateObj);
    S.set(`recap_${type}_${dk}_${ts}`,{type,date:dk,ts,content})},
  history(type){
    return S.keys().filter(k=>k.startsWith(`recap_${type}_`))
      .map(k=>({key:k,...S.get(k,{})})).sort((a,b)=>b.ts-a.ts)},
  get(key){return S.get(key,null)},
  buildPrompt(type,dates){
    const frame=Frame.get();const goals=(frame.notes.find(n=>n.id==='goals')?.items||[]);
    const logData=Log.allContent(dates);
    const start=dates[0];const end=dates[dates.length-1];
    const calEvts=Cal.cachedRange(start,D.addDays(end,1));
    // Period header so Claude knows the exact day(s) being analyzed
    const today=new Date();const todayKey=D.key(today);
    const coversToday=dates.some(dt=>D.key(dt)===todayKey);
    let prompt=`=== PÉRIODE ANALYSÉE ===\n`;
    if(type==='day')prompt+=`Jour : ${D.frenchLong(start)} (${D.key(start)})${coversToday?' — aujourd\'hui':' — recap rétroactif'}\n`;
    else if(type==='week')prompt+=`Semaine : ${D.frenchLong(start)} → ${D.frenchLong(end)}${coversToday?' — inclut aujourd\'hui':' — recap rétroactif'}\n`;
    else prompt+=`Mois : ${D.frenchMonthYear(start)} (${dates.length} jours)${coversToday?'':' — recap rétroactif'}\n`;
    prompt+=`\n=== PLANNING (Google Calendar) ===\n`;
    if(calEvts.length===0)prompt+='Aucun événement calendrier pour cette période.\n';
    else calEvts.forEach(ev=>{
      const s=ev.start?.dateTime?new Date(ev.start.dateTime):null;
      const e=ev.end?.dateTime?new Date(ev.end.dateTime):null;
      const time=s&&e?`${p2(s.getHours())}:${p2(s.getMinutes())}–${p2(e.getHours())}:${p2(e.getMinutes())}`:'Journée';
      prompt+=`${ev.start?.date||D.key(s)} ${time} : ${ev.summary||'Sans titre'}\n`;});
    prompt+=`\n=== EXÉCUTION (Logs 30min) ===\n`;
    if(logData.length===0)prompt+='Aucun log rempli pour cette période.\n';
    else logData.forEach(l=>prompt+=`${l.date} ${l.time} : ${l.text}\n`);
    prompt+=`\n=== OBJECTIFS (Goals) ===\n`;
    if(goals.length===0)prompt+='Aucun objectif défini.\n';
    else goals.forEach(g=>prompt+=`[${g.checked?'✓':'○'}] ${g.text}\n`);
    const successes=Success.rangeText(start,end);
    prompt+=`\n=== SUCCÈS / ACCOMPLISSEMENTS DE LA PÉRIODE ===\n`;
    if(successes.length===0)prompt+='Aucun succès enregistré pour cette période.\n';
    else successes.forEach(s=>{
      const d=new Date(s.ts);
      prompt+=`${D.key(d)} ${s.emoji||'🏆'} : ${s.text}\n`;
    });
    // Only include Garmin if the recap covers today (Garmin snapshot is current state only)
    if(coversToday)prompt+=Garmin.promptSummary();
    else prompt+=`\n=== GARMIN ===\nDonnées physiques indisponibles pour cette période rétroactive (Garmin ne stocke qu'un snapshot du jour courant).\n`;
    return prompt;}
};

// ── TAB SWITCHING ─────────────────────────────────────────────
function switchTab(tab,force=false){
  A.tab=tab;
  if(A.mobile()){
    A.noteLevel=0;A.noteId=null;
    document.querySelectorAll('.tab').forEach((el,i)=>{
      const tabs=['frame','log','calendar','recap'];
      el.classList.toggle('on',tabs[i]===tab);});
    renderMainScreen();}
  else{
    document.querySelectorAll('.side-item').forEach(el=>{
      const id=el.id.replace('si-','');el.classList.toggle('on',id===tab);});
    document.querySelectorAll('.sec').forEach(el=>{
      const id=el.id.replace('sec-','');el.classList.toggle('on',id===tab);});
    const sec=document.getElementById(`sec-${tab}`);
    if(sec&&(!sec.dataset.loaded||force)){sec.dataset.loaded='1';sec.innerHTML=renderSection(tab);}
    if(tab==='log')setTimeout(bindLogInputs,50);
    if(tab==='calendar')setTimeout(initCalendar,50);}
}

// ── MOBILE NAV ────────────────────────────────────────────────
function renderMainScreen(){
  const main=document.getElementById('screen-main');
  if(!main)return;
  main.innerHTML=renderSection(A.tab);
  if(A.tab==='log')setTimeout(bindLogInputs,50);
  if(A.tab==='calendar')setTimeout(initCalendar,50);
  updateNavBar();}

function updateNavBar(){
  const back=document.getElementById('nav-back-btn');
  const title=document.getElementById('nav-title');
  const right=document.getElementById('nav-right-btn');
  if(!back)return;
  const tabTitles={frame:'Frame',log:'Log',calendar:'Calendrier',success:'Succès',recap:'Recap',settings:'Paramètres'};
  if(A.tab==='frame'&&A.noteLevel===1&&A.noteId){
    back.style.visibility='visible';back.textContent='Notes';
    const n=Frame.note(A.noteId);title.textContent=n?n.title:'Note';
    const addable=['checklist','to_plan','goals'];
    right.style.visibility=(n&&(n.type==='checklist'||n.type==='text'))?'visible':'hidden';
    right.textContent='＋';}
  else{
    back.style.visibility='hidden';
    title.textContent=tabTitles[A.tab]||A.tab;
    right.style.visibility='hidden';}
}

function navBack(){
  if(A.tab==='frame'&&A.noteLevel===1){
    A.noteLevel=0;A.noteId=null;
    const main=document.getElementById('screen-main');
    const sub=document.getElementById('screen-sub');
    sub.classList.remove('active');sub.classList.add('slide-in');
    main.classList.remove('slide-out');
    updateNavBar();}}

function navRightAction(){
  if(A.tab==='frame'&&A.noteId){
    const n=Frame.note(A.noteId);
    if(n&&n.type==='checklist'){addCheckItem(A.noteId);}
    else if(n&&n.type==='text'){addTextLine(A.noteId);}}}

function openNote(id){
  A.noteId=id;A.noteLevel=1;
  const sub=document.getElementById('screen-sub');
  const main=document.getElementById('screen-main');
  sub.innerHTML=renderNoteContent(id);
  sub.classList.remove('slide-in');
  sub.offsetHeight; // reflow
  sub.classList.add('active');
  main.classList.add('slide-out');
  updateNavBar();
  setTimeout(()=>bindNoteEvents(id),50);}

// ── SECTION ROUTER ─────────────────────────────────────────────
function renderSection(tab){
  switch(tab){
    case 'frame': return renderFrame();
    case 'log': return renderLog();
    case 'calendar': return renderCalendar();
    case 'success': return renderSuccess();
    case 'recap': return renderRecap();
    case 'settings': return renderSettings();
    default: return '';}
}

window.selectDesktopNote=function(id){
  A.noteId=id;
  document.querySelectorAll('.notes-item').forEach(el=>{el.style.background='';});
  const item=document.getElementById(`nd-item-${id}`);if(item)item.style.background='#F0F5FF';
  const content=document.getElementById('nd-content');
  if(content){
    const n=Frame.note(id);
    if(n&&n.type==='text'){
      // RTE handles its own layout — no outer padding wrapper
      content.style.padding='0';content.style.overflow='hidden';content.style.display='flex';content.style.flexDirection='column';
      content.innerHTML=renderNoteBody(n);
    }else{
      content.style.padding='';content.style.overflow='';content.style.display='';content.style.flexDirection='';
      content.innerHTML=n?`<div style="padding:28px 36px">${renderNoteBody(n)}</div>`:'';
    }
    setTimeout(()=>bindNoteEvents(id),50);}
};

function renderNoteContent(id){
  const n=Frame.note(id);if(!n)return'';
  // text type uses RTE which handles its own layout
  if(n.type==='text')return renderNoteBody(n);
  return`<div class="note-body" style="min-height:100vh">${renderNoteBody(n)}</div>`;}

function renderNoteBody(n){
  const titleHtml=`<textarea class="note-big-title" id="note-title-${n.id}"
  rows="1"
  oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';deb('ttl-${n.id}',()=>updateNoteTitle('${n.id}',this.value),400)"
  onchange="updateNoteTitle('${n.id}',this.value)">${esc(n.title)}</textarea>
<div class="note-divider"></div>`;
  switch(n.type){
    case 'text': return `<div style="padding:0 16px 0;background:var(--card)">
<button class="note-icon-edit" onclick="editNoteIcon('${n.id}')">${n.icon||'📝'}</button>
<div class="note-icon-hint">Appuyer pour changer</div>
${titleHtml}</div>`+renderRichTextNote(n);
    case 'checklist': return titleHtml+renderChecklist(n,false);
    case 'routine': return titleHtml+renderRoutineNote(n);
    case 'sport': return titleHtml+renderSportNote(n);
    case 'analysis': return titleHtml+renderAnalysisNote(n);
    case 'personnalites': return titleHtml+renderPersonnalitesNote(n);
    default: return titleHtml+'<p>Type inconnu</p>';
  }
}

function renderChecklist(n,isRoutine=false){
  const items=n.items||[];
  return`
<div id="chklist-${n.id}">
  ${items.map((item,i)=>`
  <div class="chk-item" id="ci-${item.id}">
    <div class="chk-circle${item.checked?' on':''}" onclick="toggleCheck('${n.id}','${item.id}')"></div>
    <textarea class="chk-text${item.checked?' on':''}" id="ct-${item.id}" rows="1"
      onchange="updateCheckText('${n.id}','${item.id}',this.value)"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
      >${esc(item.text)}</textarea>
    <button class="chk-del" onclick="deleteCheckItem('${n.id}','${item.id}')" title="Supprimer">✕</button>
  </div>`).join('')}

    <span class="add-circle">＋</span><span>Nouvel élément</span>
  </button>
</div>`;}

function renderRoutineNote(n){
  const today=new Date();const checks=Frame.getRoutine(today);
  const items=n.items||[];
  const doneCount=checks.filter(c=>c.checked).length;
  return`
<div style="margin-bottom:12px">
  <span style="font-size:14px;color:var(--sec)">Aujourd'hui · ${doneCount}/${items.length} complétés</span>
</div>
<div id="routine-list">
  ${items.map(item=>{
    const check=checks.find(c=>c.id===item.id);const checked=check?.checked||false;
    return`
  <div class="chk-item" id="ri-${item.id}">
    <div class="chk-circle${checked?' on':''}" onclick="toggleRoutine('${item.id}')"></div>

function bindNoteEvents(id){

window.toggleCheck=function(noteId,itemId){
  Frame.update(noteId,n=>{const it=n.items.find(i=>i.id===itemId);if(it)it.checked=!it.checked;});
  const circle=document.querySelector(`#ci-${itemId} .chk-circle`);
  const text=document.getElementById(`ct-${itemId}`);
  if(circle){const checked=Frame.note(noteId)?.items.find(i=>i.id===itemId)?.checked;
    circle.classList.toggle('on',checked);if(text)text.classList.toggle('on',checked);}};

window.updateCheckText=function(noteId,itemId,val){
  deb(`ct-${itemId}`,()=>Frame.update(noteId,n=>{const it=n.items.find(i=>i.id===itemId);if(it)it.text=val;}));};

window.deleteCheckItem=function(noteId,itemId){
  Frame.update(noteId,n=>{n.items=n.items.filter(i=>i.id!==itemId);});
  const el=document.getElementById(`ci-${itemId}`);if(el)el.remove();};

window.addCheckItem=function(noteId){
  const id=uid();
  Frame.update(noteId,n=>{if(!n.items)n.items=[];n.items.push({id,text:'',checked:false});});
  const container=document.getElementById(`chklist-${noteId}`);
  if(container){const btn=container.querySelector('.add-line');
    const div=document.createElement('div');div.className='chk-item';div.id=`ci-${id}`;
    div.innerHTML=`<div class="chk-circle" onclick="toggleCheck('${noteId}','${id}')"></div>
      <textarea class="chk-text" id="ct-${id}" rows="1"
        onchange="updateCheckText('${noteId}','${id}',this.value)"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="chk-del" onclick="deleteCheckItem('${noteId}','${id}')">✕</button>`;
    container.insertBefore(div,btn);
    const ta=document.getElementById(`ct-${id}`);if(ta)ta.focus();}};

window.toggleRoutine=function(itemId){
  const today=new Date();const checks=Frame.getRoutine(today);
  const c=checks.find(x=>x.id===itemId);
  if(c){c.checked=!c.checked;}else{checks.push({id:itemId,checked:true});}
  Frame.saveRoutine(today,checks);
  // Re-render the full routine list (avoids :has() selector, works on all Safari)
  const n=Frame.note('routine');const list=document.getElementById('routine-list');
  if(list&&n){list.outerHTML=renderRoutineNote(n);}};


window.updateTextLine=function(noteId,idx,val){
  deb(`tl-${noteId}-${idx}`,()=>Frame.update(noteId,n=>{if(n.lines)n.lines[idx]=val;}));};

window.textLineKeydown=function(e,noteId,idx){
  if(e.key==='Enter'){e.preventDefault();addTextLine(noteId,idx+1);}
  if(e.key==='Backspace'){const ta=e.target;if(ta.value===''&&idx>0){e.preventDefault();deleteTextLine(noteId,idx);}}};

window.addTextLine=function(noteId,afterIdx){
  Frame.update(noteId,n=>{if(!n.lines)n.lines=[];
    if(afterIdx!=null)n.lines.splice(afterIdx,0,'');else n.lines.push('');});
  const n=Frame.note(noteId);
  const container=document.getElementById(`textlines-${noteId}`);
  if(container&&n){container.innerHTML=renderTextNote(n).replace(/<div id="textlines[^>]+>/,'').replace(/<\/div>$/,'');
    bindNoteEvents(noteId);}};

window.deleteTextLine=function(noteId,idx){
  Frame.update(noteId,n=>{if(n.lines)n.lines.splice(idx,1);});
  const n=Frame.note(noteId);const container=document.getElementById(`textlines-${noteId}`);
  if(container&&n){container.innerHTML=renderTextNote(n).replace(/<div id="textlines[^>]+>/,'').replace(/<\/div>$/,'');}};

  </div>

      <div class="log-time">${s.time}</div>

function bindLogInputs(){
  document.querySelectorAll('.log-inp').forEach(el=>{

window.logNav=function(dir){
  A.logDate=D.addDays(A.logDate,dir);

window.logGoToday=function(){A.logDate=new Date();refreshLogSection();};

function refreshLogSection(){
  if(A.mobile()){const main=document.getElementById('screen-main');if(main)main.innerHTML=renderLog();}
  else{const sec=document.getElementById('sec-log');if(sec){sec.innerHTML=renderLog();sec.dataset.loaded='1';}}
  setTimeout(bindLogInputs,50);}

window.logInput=function(el){
  el.style.height='auto';el.style.height=el.scrollHeight+'px';
  const time=el.dataset.time;const text=el.value;
  deb(`log-${time}`,()=>{
    Log.set(A.logDate,time,text);
    const row=el.closest('.log-slot');if(row)row.classList.toggle('has-c',!!text.trim());
    // update tab dot on mobile
    const dot=document.querySelector('.tab:nth-child(2) .tab-dot');
    if(Log.hasContent(new Date())&&!dot){
      const logTab=document.querySelector('.tab:nth-child(2)');
      if(logTab&&!logTab.querySelector('.tab-dot')){const d=document.createElement('span');d.className='tab-dot';logTab.appendChild(d);}}
  });};

function renderEvtBlock(ev,idx,totalCols=7){
  const s=ev.start?.dateTime?new Date(ev.start.dateTime):null;
  const e=ev.end?.dateTime?new Date(ev.end.dateTime):null;
  if(!s||!e)return'';
  const top=(s.getHours()*60+s.getMinutes())/60*60;
  const h=Math.max(20,(e-s)/3600000*60);
  const color=evColor(ev);
  return`<div class="cal-evt" style="top:${top}px;height:${h}px;background:${color};color:#fff;opacity:.9">
    <div class="cal-evt-t">${esc(ev.summary||'Sans titre')}</div>
    <div class="cal-evt-s">${p2(s.getHours())}:${p2(s.getMinutes())}</div>
  </div>`;}

// Google Calendar official colorId → hex mapping
const GC_COLORS={
  '1':'#7986CB','2':'#33B679','3':'#8E24AA','4':'#E67C73',
  '5':'#F6BF26','6':'#F4511E','7':'#039BE5','8':'#616161',
  '9':'#3F51B5','10':'#0B8043','11':'#D50000'
};
function evColor(ev){
  if(ev.colorId&&GC_COLORS[ev.colorId])return GC_COLORS[ev.colorId];
  return '#1a73e8'; // Google blue par défaut
}

function initCalendar(){
  const scroll=document.getElementById('cal-scroll');
  if(scroll){const now=new Date();const offset=(now.getHours()*60+now.getMinutes())/60*60;
    scroll.scrollTop=Math.max(0,offset-120);}
  renderWeekEvents();}

async function renderWeekEvents(){
  if(!Cal.valid())return;
  const wdates=D.weekDates(A.calDate);
  const cols=document.querySelectorAll('.cal-dcol');
  cols.forEach((col,i)=>{
    const d=wdates[i];if(!d)return;
    const evts=Cal.cached(d);
    evts.forEach((ev,ei)=>{const block=renderEvtBlock(ev,ei);if(block)col.insertAdjacentHTML('beforeend',block);});});
  // Now line
  if(A.calView==='week'){
    const today=new Date();const wdates=D.weekDates(A.calDate);
    const todayIdx=wdates.findIndex(d=>D.isToday(d));
    if(todayIdx>=0){const col=cols[todayIdx];if(col){const top=(today.getHours()*60+today.getMinutes())/60*60;
      col.insertAdjacentHTML('beforeend',`<div class="cal-now-line" style="top:${top}px"><div class="cal-now-dot"></div></div>`);}}}}

window.calNavWeek=function(dir){
  if(A.calView==='month')A.calDate=D.addMonths(A.calDate,dir);
  else A.calDate=D.addDays(A.calDate,dir*7);
  refreshCalSection();
  if(Cal.valid()){
    const wdates=D.weekDates(A.calDate);
    Cal.fetchRange(wdates[0],D.addDays(wdates[6],1)).then(()=>refreshCalSection()).catch(()=>{});
  }};
window.calGoToday=function(){
  A.calDate=new Date();
  refreshCalSection();
  if(Cal.valid()){
    const wdates=D.weekDates(A.calDate);
    Cal.fetchRange(wdates[0],D.addDays(wdates[6],1)).then(()=>refreshCalSection()).catch(()=>{});

window.calMiniNav=function(dir){

window.calSync=async function(){
  if(!Cal.valid()){alert('Token expiré. Reconnectez-vous dans les Paramètres.');return;}
  const wdates=D.weekDates(A.calDate);
  const start=wdates[0];const end=D.addDays(wdates[6],1);
  await Cal.fetchRange(start,end);
  refreshCalSection();
  alert('Synchronisation terminée.');};

function renderSuccess(){
  const entries=Success.getSorted();
  const today=new Date();
  const relDate=(ts)=>{
    const d=new Date(ts);
    const dDay=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    const tDay=new Date(today.getFullYear(),today.getMonth(),today.getDate());
    const diff=Math.round((tDay-dDay)/(24*60*60*1000));
    if(diff===0)return"Aujourd'hui";
    if(diff===1)return'Hier';
    if(diff===-1)return'Demain';
    if(diff>0&&diff<7)return`il y a ${diff} jours`;
    if(diff<0&&diff>-7)return`dans ${-diff} jours`;
    if(diff>0&&diff<30)return`il y a ${Math.round(diff/7)} sem.`;
    return D.frenchLong(d);
  };
  const isoOf=(ts)=>{const d=new Date(ts);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;};
  return`
<div class="success-body">
  <div class="success-hd">
    <div class="success-title">Succès</div>
    <div class="success-sub">${entries.length} accomplissement${entries.length>1?'s':''} célébré${entries.length>1?'s':''}</div>

  <button class="success-add-btn" onclick="addSuccess()">

  <div class="success-empty">
    <div style="font-size:42px;line-height:1;margin-bottom:8px">🏆</div>

    <div style="font-size:14px;color:var(--sec);max-width:280px;margin:0 auto">Note ici tout ce dont tu es fier — petites victoires comme grandes étapes.</div>
  </div>`:''}
  ${entries.map(e=>`
  <div class="success-card" id="suc-${e.id}">
    <button class="success-emoji" onclick="editSuccessEmoji('${e.id}')">${e.emoji||'🏆'}</button>
    <div class="success-content">
      <div class="success-date-row">
        <input type="date" class="success-date-input" value="${isoOf(e.ts)}"
          onchange="updateSuccessDate('${e.id}',this.value)" max="${isoOf(Date.now())}">

  const todayIso=`${today.getFullYear()}-${p2(today.getMonth()+1)}-${p2(today.getDate())}`;
  const baseIso=`${baseDate.getFullYear()}-${p2(baseDate.getMonth()+1)}-${p2(baseDate.getDate())}`;
  let dates=[];let ctxLabel='';let ctxDates='';
  if(type==='day'){dates=[baseDate];ctxLabel=D.frenchLong(baseDate);ctxDates=D.key(baseDate);}
  else if(type==='week'){dates=D.weekDates(baseDate);ctxLabel=A.recapDate?'Semaine contenant le '+D.frenchLong(baseDate):'Semaine en cours';
    ctxDates=`${D.key(dates[0])} → ${D.key(dates[6])}`;}
  else{const first=new Date(baseDate.getFullYear(),baseDate.getMonth(),1);
    const last=new Date(baseDate.getFullYear(),baseDate.getMonth()+1,0);
    const allDays=[];let d=new Date(first);while(d<=last){allDays.push(new Date(d));d=D.addDays(d,1);}
    dates=allDays;ctxLabel=D.frenchMonthYear(baseDate);ctxDates=D.monthKey(baseDate);}
  const logCount=Log.allContent(dates).length;
  const calCount=Cal.cachedRange(dates[0],D.addDays(dates[dates.length-1],1)).length;
  const hist=Recap.history(type);
  const pickerLabel=type==='day'?'Date du jour':type==='week'?'Date dans la semaine':'Date dans le mois';
  return`
<div class="recap-body">
  <div class="seg">
    <button class="seg-btn${type==='day'?' on':''}" onclick="recapSetType('day')">Jour</button>

function formatRecapDate(h){
  const d=h.date;if(!d)return'—';
  if(h.type==='month')return `Mois : ${d}`;
  if(h.type==='week')return `Semaine du ${d}`;
  return d;}

function formatRecapText(text){
  if(!text)return'';
  // 1. Escape HTML
  let s=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // 2. Tables: header row | separator row | body rows
  s=s.replace(/^\|(.+)\|\s*\n\|[\s:|\-]+\|\s*\n((?:\|.+\|\s*\n?)+)/gm,(_,header,body)=>{
    const hcells=header.split('|').map(c=>c.trim()).filter(c=>c!=='');
    const rows=body.trim().split('\n');
    let t='<table class="md-table"><thead><tr>';
    hcells.forEach(c=>t+=`<th>${c}</th>`);
    t+='</tr></thead><tbody>';
    rows.forEach(r=>{
      const cells=r.replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      t+='<tr>'+cells.map(c=>`<td>${c}</td>`).join('')+'</tr>';
    });
    return t+'</tbody></table>';
  });

  // 3. Custom French day heading (e.g. "Lundi — Bilan" or "1/ Titre")
  s=s.replace(/^(\d+\/\s*[A-ZÀÂÉÈÊËÎÏÔÙÛÜŸÇŒÆ][^\n]+)$/gm,'<h3>$1</h3>');

  // 4. Markdown headings
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>')
     .replace(/^## (.+)$/gm,'<h2>$1</h2>')
     .replace(/^# (.+)$/gm,'<h1>$1</h1>');

  // 5. Bold / italic / code (inline)
  s=s.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')
     .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<em>$2</em>')
     .replace(/`([^`\n]+)`/g,'<code>$1</code>');

  // 6. Lists
  s=s.replace(/(?:^[-*] .+\n?)+/gm,m=>{
    const items=m.trim().split('\n').map(l=>l.replace(/^[-*] /,''));
    return '<ul>'+items.map(i=>`<li>${i}</li>`).join('')+'</ul>';
  });
  s=s.replace(/(?:^\d+\. .+\n?)+/gm,m=>{
    const items=m.trim().split('\n').map(l=>l.replace(/^\d+\. /,''));
    return '<ol>'+items.map(i=>`<li>${i}</li>`).join('')+'</ol>';
  });

  // 7. Blockquotes
  s=s.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');

  // 8. Paragraphs: wrap remaining lines, but leave block-level elements alone
  const blocks=s.split(/\n\n+/);
  return blocks.map(b=>{
    b=b.trim();
    if(!b)return'';
    if(/^<(h\d|ul|ol|table|p|div|blockquote)/.test(b))return b;
    return `<p>${b.replace(/\n/g,'<br>')}</p>`;
  }).join('');
}

window.recapSetType=function(t){
  A.recapType=t;A.recapText=null;A.recapLoading=false;A.recapViewKey=null;
  refreshRecapSection();};

window.recapSetDate=function(iso){
  A.recapDate=iso||null;A.recapText=null;A.recapViewKey=null;

window.triggerRecap=async function(){
  const baseDate=A.recapDate?new Date(A.recapDate+'T12:00:00'):new Date();
  let dates=[];
  if(A.recapType==='day')dates=[baseDate];
  else if(A.recapType==='week')dates=D.weekDates(baseDate);
  else{const first=new Date(baseDate.getFullYear(),baseDate.getMonth(),1);
    const last=new Date(baseDate.getFullYear(),baseDate.getMonth()+1,0);
    let d=new Date(first);while(d<=last){dates.push(new Date(d));d=D.addDays(d,1);}}
  A.recapLoading=true;A.recapText=null;refreshRecapSection();
  try{
    // Refresh Garmin cache if recap covers today (otherwise data is irrelevant)
    const todayKey=D.key(new Date());
    const coversToday=dates.some(dt=>D.key(dt)===todayKey);
    if(coversToday)await Garmin.refresh().catch(()=>{});
    const prompt=Recap.buildPrompt(A.recapType,dates);
    const result=await AI.analyze(prompt);
    A.recapText=result;A.recapLoading=false;
    Recap.save(A.recapType,baseDate,result);
    refreshRecapSection();}
  catch(e){A.recapLoading=false;refreshRecapSection();alert('Erreur: '+e.message);}};

window.loadRecap=function(key){
  const r=Recap.get(key);if(!r)return;
  A.recapText=r.content;A.recapViewKey=key;A.recapLoading=false;
  refreshRecapSection();};

  else{const sec=document.getElementById('sec-recap');if(sec){sec.innerHTML=renderRecap();sec.dataset.loaded='1';}}}

window.exportData=function(){
  const allData={};S.keys().forEach(k=>{allData[k]=S.get(k);});
  const json=JSON.stringify(allData,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const date=D.key(new Date());
  if(navigator.share&&A.mobile()){
    const file=new File([blob],`lifeos_export_${date}.json`,{type:'application/json'});
    navigator.share({files:[file],title:'Life OS Export'}).catch(()=>{downloadBlob(url,date);});}
  else{downloadBlob(url,date);}};

function downloadBlob(url,date){
  const a=document.createElement('a');a.href=url;a.download=`lifeos_export_${date}.json`;
  a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);}

window.importData=function(input){

  reader.onload=e=>{
    try{const data=JSON.parse(e.target.result);
      Object.entries(data).forEach(([k,v])=>S.set(k,v));
      alert(`Import réussi — ${Object.keys(data).length} clés restaurées.`);

    catch(err){alert('Erreur lors de l\'import: fichier JSON invalide.');}

function checkOAuthCallback(){
  const h=window.location.hash.substring(1);
  if(!h)return;
  const p=new URLSearchParams(h);

  const err=p.get('error');
  if(err){
    history.replaceState({},'',location.pathname);
    if(err==='interaction_required'||err==='login_required'||err==='consent_required'){
      S.set('oauth_silent_failed_at',String(Date.now()));
    }
    return;
  }

  if(Cal.handleCallback()){
    S.del('oauth_silent_failed_at');
    A.tab='calendar';
    const wdates=D.weekDates(new Date());
    Cal.fetchRange(wdates[0],D.addDays(wdates[6],1)).then(()=>{
      if(A.mobile())renderMainScreen();else switchTab('calendar',true);});
  }
}

// Silent token refresh via hidden iframe (no page reload)
function silentOAuthRefresh(){
  if(!Cal.clientId())return;
  const scope='https://www.googleapis.com/auth/calendar.readonly';
  const redir=(location.origin+location.pathname).replace(/\/$/,'');
  const url=`https://accounts.google.com/o/oauth2/v2/auth`+
    `?client_id=${encodeURIComponent(Cal.clientId())}`+
    `&redirect_uri=${encodeURIComponent(redir)}`+
    `&response_type=token&scope=${encodeURIComponent(scope)}&prompt=none`;
  const iframe=document.createElement('iframe');
  iframe.style.cssText='display:none;position:fixed;width:0;height:0;top:-200px;left:-200px';
  document.body.appendChild(iframe);
  let done=false;
  const cleanup=()=>{try{document.body.removeChild(iframe);}catch(e){}};
  const check=setInterval(()=>{
    try{
      const loc=iframe.contentWindow.location;
      if(loc.origin===location.origin){
        done=true;clearInterval(check);cleanup();
        const hp=new URLSearchParams(loc.hash.substring(1));
        const t=hp.get('access_token');const exp=hp.get('expires_in');const er=hp.get('error');
        if(t){
          S.set('google_token',t);
          S.set('google_token_expiry',String(Date.now()+parseInt(exp||'3600')*1000));
          S.del('oauth_silent_failed_at');
        } else if(er){S.set('oauth_silent_failed_at',String(Date.now()));}
      }
    }catch(e){/* cross-origin, still on Google */}
  },300);
  setTimeout(()=>{if(!done){clearInterval(check);cleanup();}},15000);
  iframe.src=url;
}

// ══════════════════════════════════════════════════════════════
// MIDNIGHT ROUTINE RESET CHECK
// ══════════════════════════════════════════════════════════════
function checkMidnight(){
  const todayKey=D.key(new Date());
  S.set('last_open_date',todayKey);
  const now=new Date();const tomorrow=new Date(now);
  tomorrow.setHours(24,0,0,0);
  setTimeout(checkMidnight,tomorrow-now);
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
function init(){
  // Detect iOS standalone PWA mode (more reliable than @media display-mode)
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  const isStandalone=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches;
  if(isStandalone){
    document.documentElement.classList.add('ios-standalone');
  }
  // Suggest Add to Home Screen on iOS Safari only (where browser chrome is visible)
  if(isIOS&&!isStandalone&&!S.get('a2hs_dismissed')){
    setTimeout(()=>{
      const b=document.getElementById('a2hs-banner');
      if(b)b.classList.add('show');
    },1500);
  }
  checkOAuthCallback();
  checkMidnight();

  // Auto silent reconnect on startup: redirect if token expired and no recent failure
  const silentFailedAt=parseInt(S.get('oauth_silent_failed_at')||'0');
  const recentlyFailed=silentFailedAt&&(Date.now()-silentFailedAt)<30*60*1000;
  if(Cal.clientId()&&!Cal.valid()&&!recentlyFailed){
    const scope='https://www.googleapis.com/auth/calendar.readonly';
    const redir=(location.origin+location.pathname).replace(/\/$/,'');
    window.location.href=`https://accounts.google.com/o/oauth2/v2/auth`+
      `?client_id=${encodeURIComponent(Cal.clientId())}`+
      `&redirect_uri=${encodeURIComponent(redir)}`+
      `&response_type=token`+
      `&scope=${encodeURIComponent(scope)}`+
      `&prompt=none`;
    return;
  }

  render();

  // Auto-pull from sync server on startup (if configured)
  if(Sync.enabled()){
    Sync.pull().then(updated=>{
      if(updated){render();}
    }).catch(()=>{});
    // Refresh Garmin cache in background
    Garmin.refresh().catch(()=>{});
  }

  // Auto-sync calendar events on startup
  if(Cal.valid()){
    const wdates=D.weekDates(new Date());
    Cal.fetchRange(wdates[0],D.addDays(wdates[6],1)).catch(()=>{});
  }

  // Proactive token refresh: check every 5 min, refresh if <10 min left
  setInterval(()=>{
    const exp=Cal.expiry();
    if(Cal.clientId()&&exp&&(exp-Date.now())<10*60*1000){
      silentOAuthRefresh();
    }
  },5*60*1000);

  // Handle resize
  let lastMobile=window.innerWidth<768;
  window.addEventListener('resize',()=>{
    const m=window.innerWidth<768;
    if(m!==lastMobile){lastMobile=m;render();}
  });
  // visualViewport: RTE toolbar position + log scroll
  if(window.visualViewport){
    const vvHandler=()=>{
      rteUpdatePos();
      const active=document.activeElement;
      if(active&&active.classList.contains('log-inp')){
        active.scrollIntoView({behavior:'smooth',block:'center'});}
    };
    window.visualViewport.addEventListener('resize',vvHandler);
    window.visualViewport.addEventListener('scroll',vvHandler);
  }
}

document.addEventListener('DOMContentLoaded',init);
// Also handle direct script execution (file:// or already parsed)
if(document.readyState==='complete'||document.readyState==='interactive'){init();}
</script>
