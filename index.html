<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life OS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Life OS</title>
<style>
:root {
  --bg: #F2F2F7; --card: #FFFFFF; --text: #000000;
  --sec: rgba(60,60,67,.6); --sep: #C6C6C8;
  --blue: #007AFF; --red: #FF3B30; --green: #34C759; --orange: #FF9500;
  --mac-bg: #ECECEC; --mac-side: #F5F5F7; --mac-text2: #6E6E73;
  --st: env(safe-area-inset-top,0px); --sb: env(safe-area-inset-bottom,0px);
  --sl: env(safe-area-inset-left,0px); --sr: env(safe-area-inset-right,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',Helvetica,sans-serif}
#app{height:100%;width:100%;position:relative}

/* ── MOBILE SHELL ── */
.sh-m{display:flex;flex-direction:column;height:100%;background:var(--bg)}
.nav{position:fixed;top:0;left:0;right:0;height:calc(44px + var(--st));padding-top:var(--st);
  background:rgba(242,242,247,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:.5px solid var(--sep);display:flex;align-items:center;
  padding-left:16px;padding-right:16px;z-index:200;gap:8px}
.nav-title{font-size:17px;font-weight:600;flex:1;text-align:center}
.nav-back{color:var(--blue);font-size:17px;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;gap:2px;font-family:inherit;padding:8px 0;min-width:64px}
.nav-back::before{content:'‹';font-size:24px;line-height:1}
.nav-right{color:var(--blue);font-size:17px;background:none;border:none;cursor:pointer;
  font-family:inherit;padding:8px 0;min-width:64px;text-align:right}
.wrap{flex:1;overflow:hidden;position:relative;padding-top:calc(44px + var(--st));padding-bottom:calc(49px + var(--sb))}
.screen{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.screen.slide-out{transform:translateX(-30%);transition:transform .3s ease;pointer-events:none}
.screen.slide-in{transform:translateX(100%)}
.screen.slide-in.active{transform:translateX(0);transition:transform .3s ease}
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(49px + var(--sb));padding-bottom:var(--sb);
  background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:.5px solid var(--sep);display:flex;align-items:stretch;z-index:200}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  cursor:pointer;padding:6px 0;color:var(--sec);font-size:10px;font-weight:500;position:relative}
.tab.on{color:var(--blue)}
.tab svg{width:24px;height:24px;fill:currentColor}
.tab-dot{position:absolute;top:6px;right:calc(50% - 16px);width:6px;height:6px;border-radius:50%;background:var(--blue)}
.fab-settings{position:fixed;top:calc(var(--st) + 7px);right:16px;z-index:210;background:none;
  border:none;cursor:pointer;color:var(--blue);font-size:20px;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center}

/* ── DESKTOP SHELL ── */
@media(min-width:768px){
  .sh-m{display:none!important}
  .sh-d{display:flex;flex-direction:row;height:100%;background:var(--mac-bg)}
  .sidebar{width:240px;min-width:240px;height:100%;background:var(--mac-side);
    border-right:1px solid rgba(0,0,0,.12);display:flex;flex-direction:column;padding:20px 0 12px;overflow-y:auto}
  .side-hd{font-size:11px;font-weight:700;color:var(--mac-text2);text-transform:uppercase;
    letter-spacing:.5px;padding:0 16px 8px}
  .side-item{display:flex;align-items:center;gap:10px;padding:7px 14px;margin:1px 8px;border-radius:7px;
    cursor:pointer;color:var(--text);font-size:14px;transition:background .1s;user-select:none}
  .side-item:hover:not(.on){background:rgba(0,0,0,.06)}
  .side-item.on{background:var(--blue);color:#fff}
  .side-icon{font-size:16px;width:22px;text-align:center}
  .side-sp{flex:1}
  .side-div{height:1px;background:rgba(0,0,0,.1);margin:8px 16px}
  .cpanel{flex:1;height:100%;overflow:hidden;background:var(--card);position:relative}
  .tab-bar{display:none!important}
  .fab-settings{display:none!important}
  .nav{display:none!important}
  .wrap{padding:0!important}
  .screen{position:static;height:100%;transform:none!important}
}
@media(max-width:767px){.sh-d{display:none!important}}

/* ── SHARED SECTION HIDE/SHOW ── */
.sec{display:none;height:100%;overflow:auto}
.sec.on{display:block}

/* ── iOS LIST ── */
.grp{margin:20px 16px 0}
.grp-hd{font-size:13px;color:var(--sec);text-transform:uppercase;letter-spacing:.3px;
  padding:0 4px 8px}
.lst{background:var(--card);border-radius:10px;overflow:hidden}
.lrow{display:flex;align-items:center;padding:11px 16px;min-height:44px;position:relative;
  cursor:pointer;transition:background .1s;gap:12px}
.lrow:active{background:rgba(0,0,0,.05)}
.lrow+.lrow::before{content:'';position:absolute;top:0;left:16px;right:0;height:.5px;background:var(--sep)}
.lrow-txt{flex:1;font-size:17px;color:var(--text)}
.lrow-sec{font-size:17px;color:var(--sec)}
.chevron{color:var(--sec);font-size:17px;margin-left:8px}
.chevron::after{content:'›'}

/* ── TOGGLE ── */
.toggle{appearance:none;-webkit-appearance:none;width:51px;height:31px;border-radius:16px;
  background:#E5E5EA;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;width:27px;height:27px;border-radius:50%;background:#fff;
  top:2px;left:2px;transition:transform .2s;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.toggle:checked{background:var(--green)}
.toggle:checked::after{transform:translateX(20px)}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:flex-end}
.overlay.center{align-items:center;justify-content:center}
.sheet{background:var(--bg);border-radius:13px 13px 0 0;width:100%;max-height:92vh;
  overflow-y:auto;padding-bottom:calc(20px + var(--sb));animation:su .3s ease}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--sep);margin:10px auto 14px}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:768px){
  .overlay{background:rgba(0,0,0,.35);backdrop-filter:blur(4px);align-items:center;justify-content:center}
  .sheet{border-radius:12px;width:90%;max-width:600px;box-shadow:0 10px 40px rgba(0,0,0,.18);
    animation:mi .2s ease}
  @keyframes mi{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
}

/* ── BUTTONS ── */
.btn{border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-blue{background:var(--blue);color:#fff;border-radius:10px;padding:13px 20px;font-size:17px;font-weight:500;width:100%}
.btn-blue:active{opacity:.8}
.btn-red{background:none;color:var(--red);font-size:17px;width:100%;padding:12px 0;text-align:center}
.btn-gray{background:#E5E5EA;color:var(--text);border-radius:8px;padding:8px 16px;font-size:15px}

/* macOS buttons */
@media(min-width:768px){
  .btn-blue{border-radius:6px;padding:6px 16px;font-size:13px;width:auto}
  .btn-gray{border-radius:6px;padding:6px 14px;font-size:13px}
}

/* ── SEGMENTED CONTROL ── */
.seg{display:flex;background:rgba(118,118,128,.12);border-radius:8px;padding:2px;margin:12px 16px}
.seg-btn{flex:1;padding:6px 0;border:none;border-radius:6px;font-size:13px;font-weight:500;
  background:transparent;color:var(--text);cursor:pointer;transition:all .15s;font-family:inherit}
.seg-btn.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* ── SPINNER ── */
.spin{width:24px;height:24px;border:2.5px solid rgba(0,122,255,.3);border-top-color:var(--blue);
  border-radius:50%;animation:ro .8s linear infinite;display:inline-block}
@keyframes ro{to{transform:rotate(360deg)}}

/* ══════════════════════════════════════════════
   FRAME — NOTES STYLE
══════════════════════════════════════════════ */
.notes-folder-hd{padding:24px 16px 8px;background:var(--card);border-bottom:.5px solid var(--sep)}
.notes-folder-title{font-size:34px;font-weight:700}
.notes-folder-sub{font-size:14px;color:var(--sec);margin-top:2px}
.notes-list{background:var(--card)}
.notes-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;cursor:pointer;
  position:relative;transition:background .1s}
.notes-item:active{background:var(--bg)}
.notes-item+.notes-item::before{content:'';position:absolute;top:0;left:60px;right:0;height:.5px;background:var(--sep)}
.notes-icon{font-size:28px;line-height:1;margin-top:3px;width:36px;text-align:center;flex-shrink:0}
.notes-info{flex:1;min-width:0}
.notes-title{font-size:17px;font-weight:600;margin-bottom:2px}
.notes-preview{display:flex;gap:6px;align-items:baseline}
.notes-date{font-size:14px;color:var(--sec);white-space:nowrap}
.notes-snip{font-size:14px;color:var(--sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notes-chev{color:var(--sep);font-size:20px;align-self:center;margin-left:auto}

/* Note body */
.note-body{padding:16px;background:var(--card);min-height:100%}
.note-big-title{font-size:28px;font-weight:700;color:var(--text);width:100%;border:none;
  background:transparent;outline:none;font-family:inherit;margin-bottom:12px;line-height:1.2;resize:none}
.note-divider{height:.5px;background:var(--sep);margin:0 0 12px}

/* Checklist */
.chk-item{display:flex;align-items:flex-start;gap:12px;padding:5px 0;position:relative}
.chk-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--sep);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .15s}
.chk-circle.on{background:var(--orange);border-color:var(--orange);color:#fff;font-size:12px}
.chk-circle.on::after{content:'✓'}
.chk-text{flex:1;font-size:17px;line-height:1.5;outline:none;border:none;background:transparent;
  font-family:inherit;color:var(--text);min-width:0;resize:none;padding:0}
.chk-text.on{text-decoration:line-through;color:var(--sec)}
.chk-del{background:none;border:none;color:var(--sep);font-size:20px;cursor:pointer;padding:0 4px;
  line-height:1;opacity:0;transition:opacity .15s}
.chk-item:hover .chk-del{opacity:1}
.add-line{display:flex;align-items:center;gap:12px;padding:8px 0;cursor:pointer;
  color:var(--blue);font-size:17px;background:none;border:none;font-family:inherit;width:100%}
.add-circle{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

/* Plain text note */
.txt-line{font-size:17px;line-height:1.7;color:var(--text);width:100%;border:none;background:transparent;
  outline:none;font-family:inherit;resize:none;min-height:28px;display:block}
.txt-line::placeholder{color:var(--sep)}

/* Sport table */
.sport-tbl{width:100%;border-collapse:collapse;margin:8px 0;font-size:15px}
.sport-tbl th{background:#F2F2F7;padding:7px 10px;border:1px solid var(--sep);font-size:13px;
  font-weight:600;color:var(--sec);text-align:left}
.sport-tbl td{padding:7px 10px;border:1px solid var(--sep);color:var(--text)}
.tbl-sub{font-size:15px;font-weight:700;color:var(--text);margin:14px 0 6px}

/* Personnalités */
.pers-name{font-size:19px;font-weight:700;margin:8px 0 6px}
.pers-trait{font-size:16px;color:var(--text);padding:3px 0 3px 20px;position:relative}
.pers-trait::before{content:'—';position:absolute;left:0;color:var(--sec)}

/* Analysis */
.ana-hd{font-size:15px;font-weight:700;margin:14px 0 6px}
.ana-item{font-size:16px;padding:3px 0 3px 20px;position:relative;color:var(--text)}
.ana-item::before{content:'•';position:absolute;left:6px;color:var(--sec)}

/* Desktop 3-col Notes */
@media(min-width:768px){
  .notes-d{display:flex;height:100%}
  .nd-folders{width:190px;border-right:1px solid var(--sep);background:var(--mac-side);padding:16px 0;overflow-y:auto}
  .nd-title-bar{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--sep)}
  .td{width:13px;height:13px;border-radius:50%}
  .td-r{background:#FF5F57}.td-y{background:#FEBC2E}.td-g{background:#28C840}
  .nd-folder-item{padding:7px 14px;cursor:pointer;border-radius:6px;margin:2px 8px;font-size:14px;
    display:flex;align-items:center;gap:8px;color:var(--text);transition:background .1s}
  .nd-folder-item.on{background:rgba(0,122,255,.15);color:var(--blue)}
  .nd-folder-item:not(.on):hover{background:rgba(0,0,0,.05)}
  .nd-list{width:280px;border-right:1px solid var(--sep);overflow-y:auto}
  .nd-content{flex:1;overflow-y:auto;padding:28px 36px}
  .note-big-title{font-size:30px}
}

/* ══════════════════════════════════════════════
   LOG
══════════════════════════════════════════════ */
.log-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
  background:var(--card);border-bottom:.5px solid var(--sep);position:sticky;top:0;z-index:10;gap:12px}
.log-nav-btn{color:var(--blue);font-size:20px;background:none;border:none;cursor:pointer;
  padding:4px 10px;font-family:inherit;font-weight:300}
.log-date-label{font-size:17px;font-weight:600;text-align:center;min-width:170px}
.log-today{color:var(--blue);font-size:15px;background:none;border:none;cursor:pointer;font-family:inherit}
.log-slot{display:flex;align-items:stretch;min-height:42px;border-bottom:.5px solid #F2F2F7;background:var(--card)}
.log-slot.has-c{border-left:3px solid var(--blue)}
.log-time{width:58px;flex-shrink:0;font-size:12px;color:var(--sec);padding:10px 6px 10px 14px;
  font-variant-numeric:tabular-nums;line-height:1.5;padding-top:12px}
.log-inp{flex:1;border:none;background:transparent;font-size:15px;color:var(--text);
  padding:11px 14px 11px 4px;outline:none;font-family:inherit;resize:none;min-height:42px;
  -webkit-appearance:none}
.log-inp::placeholder{color:var(--sep)}

/* ══════════════════════════════════════════════
   CALENDAR
══════════════════════════════════════════════ */
.cal-connect{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:40px 32px;gap:20px;text-align:center}
.cal-connect-icon{font-size:72px}
.cal-connect-title{font-size:26px;font-weight:700}
.cal-connect-sub{font-size:16px;color:var(--sec);line-height:1.5}
.g-btn{background:#fff;border:1px solid #DADCE0;border-radius:4px;padding:10px 24px;
  display:flex;align-items:center;gap:12px;cursor:pointer;font-size:15px;font-weight:500;
  color:#3C4043;box-shadow:0 1px 3px rgba(0,0,0,.1);font-family:inherit}
.g-logo{font-size:20px;line-height:1}

/* Calendar header */
.cal-hd{background:#1a73e8;color:#fff;padding:8px 16px;display:flex;align-items:center;gap:16px;
  flex-shrink:0}
.cal-hd-title{font-size:17px;font-weight:500;flex:1}
.cal-icon-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:22px;padding:4px;
  font-family:inherit}
.cal-view-bar{display:flex;padding:8px 16px;gap:4px;overflow-x:auto;flex-shrink:0;background:var(--card);
  border-bottom:.5px solid var(--sep)}
.cal-vbtn{background:none;border:none;padding:6px 14px;border-radius:16px;font-size:13px;font-weight:500;
  cursor:pointer;font-family:inherit;color:var(--sec);white-space:nowrap}
.cal-vbtn.on{background:rgba(26,115,232,.12);color:#1a73e8}

/* Week strip */
.week-strip{background:var(--card);padding:8px 0;border-bottom:.5px solid var(--sep);flex-shrink:0}
.week-cols{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px}
.week-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.week-dn{font-size:11px;color:var(--sec);text-transform:uppercase;font-weight:500}
.week-dd{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:14px;cursor:pointer}
.week-dd.today{background:#EA4335;color:#fff;font-weight:700}
.week-dd.sel{background:rgba(26,115,232,.2);color:#1a73e8}

/* Week grid */
.cal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--card)}
.cal-grid{display:flex}
.cal-times{width:50px;flex-shrink:0}
.cal-tlabel{height:60px;display:flex;align-items:flex-start;justify-content:flex-end;
  padding:4px 8px 0;font-size:10px;color:var(--sec);font-variant-numeric:tabular-nums}
.cal-gcols{flex:1;display:grid;grid-template-columns:repeat(7,1fr);position:relative}
.cal-dcol{border-left:.5px solid #F0F0F0;position:relative}
.cal-hour{height:60px;border-top:.5px solid #F0F0F0}
.cal-evt{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 5px;
  font-size:11px;overflow:hidden;cursor:pointer;z-index:5}
.cal-evt-t{font-weight:600;line-height:1.3;margin-bottom:1px}
.cal-evt-s{font-size:10px;opacity:.85}
.cal-now-line{position:absolute;left:0;right:0;height:2px;background:#EA4335;z-index:10;pointer-events:none}
.cal-now-dot{position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#EA4335}
.cal-fab{position:fixed;bottom:calc(58px + var(--sb));right:18px;width:56px;height:56px;border-radius:50%;
  background:#EA4335;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.25);cursor:pointer;border:none;z-index:50}

/* Month view */
.cal-month{padding:0;overflow-y:auto}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.month-dn{font-size:12px;color:var(--sec);text-align:center;padding:8px 0 4px;font-weight:500}
.month-day{border-top:.5px solid var(--sep);padding:4px;min-height:72px;cursor:pointer}
.month-day-num{font-size:14px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px}
.month-day-num.today{background:#EA4335;color:#fff;font-weight:700}
.month-day-num.other{color:var(--sec)}
.month-evt{font-size:11px;background:#1a73e8;color:#fff;border-radius:2px;padding:1px 4px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Schedule view */
.sched-day{margin-bottom:16px}
.sched-day-hd{font-size:15px;font-weight:600;color:var(--sec);padding:8px 16px;text-transform:uppercase;letter-spacing:.3px}
.sched-evt{display:flex;gap:12px;padding:8px 16px;background:var(--card);border-bottom:.5px solid var(--sep)}
.sched-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
.sched-info{flex:1}
.sched-title{font-size:15px;font-weight:500}
.sched-time{font-size:13px;color:var(--sec)}

/* Desktop calendar */
@media(min-width:768px){
  .cal-d{display:flex;height:100%}
  .cal-d-left{width:260px;border-right:1px solid var(--sep);padding:16px;overflow-y:auto;flex-shrink:0}
  .cal-d-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .cal-d-topbar{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid var(--sep);gap:16px;flex-shrink:0}
  .cal-d-title{font-size:22px;font-weight:400;color:#3C4043;flex:1}
  .cal-mini{margin-top:16px}
  .cal-mini-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .cal-mini-title{font-size:14px;font-weight:600}
  .cal-mini-nav{background:none;border:none;cursor:pointer;font-size:16px;color:var(--sec)}
  .cal-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-mini-d{display:flex;align-items:center;justify-content:center;height:26px;font-size:12px;
    border-radius:50%;cursor:pointer;color:var(--text)}
  .cal-mini-d.hd{font-weight:600;color:var(--sec);font-size:11px;cursor:default}
  .cal-mini-d.today{background:#EA4335;color:#fff;font-weight:700}
  .cal-mini-d.sel{background:rgba(26,115,232,.2);color:#1a73e8}
  .cal-my-cals{margin-top:20px}

  const aicon=document.createElement('link');aicon.rel='apple-touch-icon';aicon.href=ico;document.head.appendChild(aicon);
  // Service Worker — cache-first pour offline (HTTPS uniquement)
  if('serviceWorker' in navigator && location.protocol==='https:'){
    const swCode=`
const CACHE='life-os-v1';
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/'])));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET')return;
  e.respondWith(
    caches.match(e.request).then(cached=>{
      const net=fetch(e.request).then(r=>{
        if(r.ok){const cl=r.clone();caches.open(CACHE).then(c=>c.put(e.request,cl));}
        return r;
      }).catch(()=>cached);
      return cached||net;
    })
  );
});`;
    const swBlob=new Blob([swCode],{type:'text/javascript'});
    const swUrl=URL.createObjectURL(swBlob);

})();

// ── STORAGE ────────────────────────────────────────────────────

// ── DATE UTILS ─────────────────────────────────────────────────
const D={
  key(d){const x=d instanceof Date?d:new Date(d);return `${x.getFullYear()}-${p2(x.getMonth()+1)}-${p2(x.getDate())}`},
  monthKey(d){const x=d instanceof Date?d:new Date(d);return `${x.getFullYear()}-${p2(x.getMonth()+1)}`},
  frenchLong(d){const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;},
  frenchMonthYear(d){const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    return `${months[d.getMonth()]} ${d.getFullYear()}`;},
  frenchMini(d){const months=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
    return `${months[d.getMonth()]} ${d.getFullYear()}`;},
  dayNames:['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'],
  dayNamesFull:['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'],
  isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear()},
  isSameDay(a,b){return a.getDate()===b.getDate()&&a.getMonth()===b.getMonth()&&a.getFullYear()===b.getFullYear()},
  addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r},
  addMonths(d,n){const r=new Date(d);r.setMonth(r.getMonth()+n);return r},
  monday(d){const r=new Date(d);const day=r.getDay();const diff=day===0?-6:1-day;r.setDate(r.getDate()+diff);return r},
  weekDates(d){const m=D.monday(d);return Array.from({length:7},(_,i)=>D.addDays(m,i))},
  monthDates(d){const first=new Date(d.getFullYear(),d.getMonth(),1);
    const last=new Date(d.getFullYear(),d.getMonth()+1,0);
    const start=D.monday(first);const dates=[];let cur=new Date(start);
    while(cur<=last||cur.getMonth()===d.getMonth()){dates.push(new Date(cur));cur=D.addDays(cur,1);if(dates.length>42)break}
    return dates;}
};
function p2(n){return String(n).padStart(2,'0')}

const Frame={
  get(){return S.get('lifeframe_data',null)||defaultFrame()},
  save(d){S.set('lifeframe_data',d)},
  note(id){return this.get().notes.find(n=>n.id===id)},

// ── LOG DB ─────────────────────────────────────────────────────
const SLOTS=(()=>{const a=[];for(let h=6;h<=23;h++)for(let m=0;m<60;m+=30){if(h===23&&m===30)continue;a.push(`${p2(h)}:${p2(m)}`)}return a})();
const Log={
  get(date){const k=`log_${D.key(date)}`;const s=S.get(k,null);return s||SLOTS.map(t=>({time:t,text:''}))},
  set(date,time,text){const k=`log_${D.key(date)}`;const d=this.get(date);const slot=d.find(s=>s.time===time);if(slot){slot.text=text;S.set(k,d)}},
  hasContent(date){return this.get(date).some(s=>s.text.trim())},
  count(date){return this.get(date).filter(s=>s.text.trim()).length},
  allContent(dates){return dates.flatMap(d=>this.get(d).filter(s=>s.text.trim()).map(s=>({date:D.key(d),time:s.time,text:s.text})))}
};

// ── CALENDAR DB ────────────────────────────────────────────────
const Cal={
  clientId(){return S.get('google_client_id','')},
  token(){return S.get('google_token',null)},
  expiry(){return S.get('google_token_expiry',null)},
  valid(){const t=this.token();const e=this.expiry();return!!(t&&(!e||Date.now()<e))},
  startOAuth(){
    const cid=this.clientId();
    if(!cid){alert('Configurez votre Google OAuth Client ID dans les Paramètres.');return;}
    const scope='https://www.googleapis.com/auth/calendar.readonly';
    const redir=window.location.href.split('?')[0].split('#')[0];
    const url=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(cid)}&redirect_uri=${encodeURIComponent(redir)}&response_type=token&scope=${encodeURIComponent(scope)}`;
    window.location.href=url;},
  handleCallback(){
    const h=window.location.hash.substring(1);if(!h)return false;
    const p=new URLSearchParams(h);const t=p.get('access_token');const exp=p.get('expires_in');
    if(t){S.set('google_token',t);S.set('google_token_expiry',Date.now()+parseInt(exp||'3600')*1000);
      S.set('last_cal_sync',new Date().toISOString());
      history.replaceState({},'',location.pathname);return true;}
    return false;},
  async fetchRange(start,end){
    if(!this.valid())return null;
    const tm=start.toISOString();const tM=end.toISOString();
    const url=`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(tm)}&timeMax=${encodeURIComponent(tM)}&orderBy=startTime&singleEvents=true&maxResults=250`;
    try{
      const r=await fetch(url,{headers:{'Authorization':`Bearer ${this.token()}`}});
      if(r.status===401){S.del('google_token');S.del('google_token_expiry');return null;}
      const data=await r.json();const items=data.items||[];
      // cache by day
      const byDay={};
      for(const ev of items){const s=ev.start?.dateTime||ev.start?.date;if(s){const dk=s.substring(0,10);(byDay[dk]=byDay[dk]||[]).push(ev);}}
      for(const[dk,evs]of Object.entries(byDay))S.set(`calendar_cache_${dk}`,evs);
      S.set('last_cal_sync',new Date().toISOString());
      return items;}
    catch(e){console.error('Cal fetch:',e);return [];}},
  cached(date){return S.get(`calendar_cache_${D.key(date)}`,[])},
  cachedRange(start,end){
    const evs=[];let d=new Date(start);
    while(d<=end){evs.push(...this.cached(d));d=D.addDays(d,1);}
    return evs;},
  evColors:['#1a73e8','#0F9D58','#F4B400','#DB4437','#7986CB','#33B679','#039BE5','#E67C73','#8D6E63']
};

const AI={

    const key=S.get('anthropic_key','');
    if(!key)throw new Error('Clé API Anthropic manquante — configurez-la dans les Paramètres.');
    const r=await fetch('https://api.anthropic.com/v1/messages',{

        'anthropic-dangerous-direct-browser-access':'true'},

        messages:[{role:'user',content:prompt}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Erreur API ${r.status}`);}
    const d=await r.json();return d.content?.[0]?.text||'';}
};

// ── RECAP DB ───────────────────────────────────────────────────
const Recap={
  save(type,dateObj,content){
    const ts=Date.now();
    const dk=type==='month'?D.monthKey(dateObj):D.key(dateObj);
    S.set(`recap_${type}_${dk}_${ts}`,{type,date:dk,ts,content})},
  history(type){
    return S.keys().filter(k=>k.startsWith(`recap_${type}_`))
      .map(k=>({key:k,...S.get(k,{})})).sort((a,b)=>b.ts-a.ts)},
  get(key){return S.get(key,null)},
  buildPrompt(type,dates){
    const frame=Frame.get();const goals=(frame.notes.find(n=>n.id==='goals')?.items||[]);
    const logData=Log.allContent(dates);
    const start=dates[0];const end=dates[dates.length-1];
    const calEvts=Cal.cachedRange(start,D.addDays(end,1));
    let prompt=`=== PLANNING (Google Calendar) ===\n`;
    if(calEvts.length===0)prompt+='Aucun événement calendrier pour cette période.\n';
    else calEvts.forEach(ev=>{
      const s=ev.start?.dateTime?new Date(ev.start.dateTime):null;
      const e=ev.end?.dateTime?new Date(ev.end.dateTime):null;
      const time=s&&e?`${p2(s.getHours())}:${p2(s.getMinutes())}–${p2(e.getHours())}:${p2(e.getMinutes())}`:'Journée';
      prompt+=`${ev.start?.date||D.key(s)} ${time} : ${ev.summary||'Sans titre'}\n`;});
    prompt+=`\n=== EXÉCUTION (Logs 30min) ===\n`;
    if(logData.length===0)prompt+='Aucun log rempli pour cette période.\n';
    else logData.forEach(l=>prompt+=`${l.date} ${l.time} : ${l.text}\n`);
    prompt+=`\n=== OBJECTIFS (Goals) ===\n`;
    if(goals.length===0)prompt+='Aucun objectif défini.\n';
    else goals.forEach(g=>prompt+=`[${g.checked?'✓':'○'}] ${g.text}\n`);
    return prompt;}
};

// ── TAB SWITCHING ─────────────────────────────────────────────
function switchTab(tab,force=false){
  A.tab=tab;
  if(A.mobile()){
    A.noteLevel=0;A.noteId=null;
    document.querySelectorAll('.tab').forEach((el,i)=>{
      const tabs=['frame','log','calendar','recap'];
      el.classList.toggle('on',tabs[i]===tab);});
    renderMainScreen();}
  else{
    document.querySelectorAll('.side-item').forEach(el=>{
      const id=el.id.replace('si-','');el.classList.toggle('on',id===tab);});
    document.querySelectorAll('.sec').forEach(el=>{
      const id=el.id.replace('sec-','');el.classList.toggle('on',id===tab);});
    const sec=document.getElementById(`sec-${tab}`);
    if(sec&&(!sec.dataset.loaded||force)){sec.dataset.loaded='1';sec.innerHTML=renderSection(tab);}
    if(tab==='log')setTimeout(bindLogInputs,50);
    if(tab==='calendar')setTimeout(initCalendar,50);}
}

// ── MOBILE NAV ────────────────────────────────────────────────
function renderMainScreen(){
  const main=document.getElementById('screen-main');
  if(!main)return;
  main.innerHTML=renderSection(A.tab);
  if(A.tab==='log')setTimeout(bindLogInputs,50);
  if(A.tab==='calendar')setTimeout(initCalendar,50);
  updateNavBar();}

function updateNavBar(){
  const back=document.getElementById('nav-back-btn');
  const title=document.getElementById('nav-title');
  const right=document.getElementById('nav-right-btn');
  if(!back)return;
  const tabTitles={frame:'Frame',log:'Log',calendar:'Calendrier',recap:'Recap',settings:'Paramètres'};
  if(A.tab==='frame'&&A.noteLevel===1&&A.noteId){
    back.style.visibility='visible';back.textContent='Notes';
    const n=Frame.note(A.noteId);title.textContent=n?n.title:'Note';
    const addable=['checklist','to_plan','goals'];
    right.style.visibility=(n&&(n.type==='checklist'||n.type==='text'))?'visible':'hidden';
    right.textContent='＋';}
  else{
    back.style.visibility='hidden';
    title.textContent=tabTitles[A.tab]||A.tab;
    right.style.visibility='hidden';}
}

function navBack(){
  if(A.tab==='frame'&&A.noteLevel===1){
    A.noteLevel=0;A.noteId=null;
    const main=document.getElementById('screen-main');
    const sub=document.getElementById('screen-sub');
    sub.classList.remove('active');sub.classList.add('slide-in');
    main.classList.remove('slide-out');
    updateNavBar();}}

function navRightAction(){
  if(A.tab==='frame'&&A.noteId){
    const n=Frame.note(A.noteId);
    if(n&&n.type==='checklist'){addCheckItem(A.noteId);}
    else if(n&&n.type==='text'){addTextLine(A.noteId);}}}

function openNote(id){
  A.noteId=id;A.noteLevel=1;
  const sub=document.getElementById('screen-sub');
  const main=document.getElementById('screen-main');
  sub.innerHTML=renderNoteContent(id);
  sub.classList.remove('slide-in');
  sub.offsetHeight; // reflow
  sub.classList.add('active');
  main.classList.add('slide-out');
  updateNavBar();
  setTimeout(()=>bindNoteEvents(id),50);}

// ── SECTION ROUTER ─────────────────────────────────────────────
function renderSection(tab){
  switch(tab){
    case 'frame': return renderFrame();
    case 'log': return renderLog();
    case 'calendar': return renderCalendar();
    case 'recap': return renderRecap();
    case 'settings': return renderSettings();
    default: return '';}
}

// ── FRAME EVENTS ──────────────────────────────────────────────
function bindNoteEvents(id){
  document.querySelectorAll('textarea.note-big-title,textarea.chk-text,textarea.txt-line').forEach(el=>{
    el.style.height='auto';el.style.height=el.scrollHeight+'px';});}

window.updateNoteTitle=function(id,val){
  Frame.update(id,n=>{n.title=val;});};

window.toggleCheck=function(noteId,itemId){
  Frame.update(noteId,n=>{const it=n.items.find(i=>i.id===itemId);if(it)it.checked=!it.checked;});
  const circle=document.querySelector(`#ci-${itemId} .chk-circle`);
  const text=document.getElementById(`ct-${itemId}`);
  if(circle){const checked=Frame.note(noteId)?.items.find(i=>i.id===itemId)?.checked;
    circle.classList.toggle('on',checked);if(text)text.classList.toggle('on',checked);}};

window.updateCheckText=function(noteId,itemId,val){
  deb(`ct-${itemId}`,()=>Frame.update(noteId,n=>{const it=n.items.find(i=>i.id===itemId);if(it)it.text=val;}));};

window.deleteCheckItem=function(noteId,itemId){
  Frame.update(noteId,n=>{n.items=n.items.filter(i=>i.id!==itemId);});
  const el=document.getElementById(`ci-${itemId}`);if(el)el.remove();};

window.addCheckItem=function(noteId){
  const id=uid();
  Frame.update(noteId,n=>{if(!n.items)n.items=[];n.items.push({id,text:'',checked:false});});
  const container=document.getElementById(`chklist-${noteId}`);
  if(container){const btn=container.querySelector('.add-line');
    const div=document.createElement('div');div.className='chk-item';div.id=`ci-${id}`;
    div.innerHTML=`<div class="chk-circle" onclick="toggleCheck('${noteId}','${id}')"></div>
      <textarea class="chk-text" id="ct-${id}" rows="1"
        onchange="updateCheckText('${noteId}','${id}',this.value)"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="chk-del" onclick="deleteCheckItem('${noteId}','${id}')">✕</button>`;
    container.insertBefore(div,btn);
    const ta=document.getElementById(`ct-${id}`);if(ta)ta.focus();}};

window.toggleRoutine=function(itemId){
  const today=new Date();const checks=Frame.getRoutine(today);
  const c=checks.find(x=>x.id===itemId);
  if(c){c.checked=!c.checked;}else{checks.push({id:itemId,checked:true});}
  Frame.saveRoutine(today,checks);
  // Re-render the full routine list (avoids :has() selector, works on all Safari)
  const n=Frame.note('routine');const list=document.getElementById('routine-list');
  if(list&&n){list.outerHTML=renderRoutineNote(n);}};


window.updateTextLine=function(noteId,idx,val){
  deb(`tl-${noteId}-${idx}`,()=>Frame.update(noteId,n=>{if(n.lines)n.lines[idx]=val;}));};

window.textLineKeydown=function(e,noteId,idx){
  if(e.key==='Enter'){e.preventDefault();addTextLine(noteId,idx+1);}
  if(e.key==='Backspace'){const ta=e.target;if(ta.value===''&&idx>0){e.preventDefault();deleteTextLine(noteId,idx);}}};

window.addTextLine=function(noteId,afterIdx){
  Frame.update(noteId,n=>{if(!n.lines)n.lines=[];
    if(afterIdx!=null)n.lines.splice(afterIdx,0,'');else n.lines.push('');});
  const n=Frame.note(noteId);
  const container=document.getElementById(`textlines-${noteId}`);
  if(container&&n){container.innerHTML=renderTextNote(n).replace(/<div id="textlines[^>]+>/,'').replace(/<\/div>$/,'');
    bindNoteEvents(noteId);}};

window.deleteTextLine=function(noteId,idx){
  Frame.update(noteId,n=>{if(n.lines)n.lines.splice(idx,1);});
  const n=Frame.note(noteId);const container=document.getElementById(`textlines-${noteId}`);
  if(container&&n){container.innerHTML=renderTextNote(n).replace(/<div id="textlines[^>]+>/,'').replace(/<\/div>$/,'');}};

window.logInput=function(el){
  el.style.height='auto';el.style.height=el.scrollHeight+'px';

  deb(`log-${time}`,()=>{
    Log.set(A.logDate,time,text);

    // update tab dot on mobile
    const dot=document.querySelector('.tab:nth-child(2) .tab-dot');

function renderCalView(){
  switch(A.calView){
    case 'day':return renderCalDay();
    case 'week':return renderCalWeek();
    case 'month':return renderCalMonth();
    case 'schedule':return renderCalSchedule();
    default:return renderCalWeek();}
}

function renderCalDay(){

function renderCalMonth(){
  const d=A.calDate;const dates=D.monthDates(d);
  const dayNamesShort=['L','M','M','J','V','S','D'];
  return`
<div class="cal-month" style="overflow-y:auto;flex:1">
  <div class="month-grid">
    ${dayNamesShort.map(n=>`<div class="month-dn">${n}</div>`).join('')}

      const evts=Cal.cached(date);
      const other=date.getMonth()!==d.getMonth();
      return`<div class="month-day" onclick="A.calDate=new Date(${date.getTime()});calSetView('day')">
        <div class="month-day-num${D.isToday(date)?' today':other?' other':''}">${date.getDate()}</div>
        ${evts.slice(0,3).map(ev=>`<div class="month-evt" style="background:${evColor(ev)}">${esc(ev.summary||'')}</div>`).join('')}

      </div>`;}).join('')}
  </div>

function renderCalSchedule(){
  const start=D.monday(A.calDate);const dates=Array.from({length:7},(_,i)=>D.addDays(start,i));
  const months=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
  const allEvts=dates.map(d=>({date:d,evts:Cal.cached(d)})).filter(x=>x.evts.length>0);
  if(allEvts.length===0)return`<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Aucun événement cette semaine</div></div>`;
  return`
<div style="overflow-y:auto;flex:1;padding-bottom:80px">
  ${allEvts.map(({date,evts})=>`
  <div class="sched-day">
    <div class="sched-day-hd">${D.dayNamesFull[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]}</div>
    ${evts.map(ev=>{
      const s=ev.start?.dateTime?new Date(ev.start.dateTime):null;
      const e=ev.end?.dateTime?new Date(ev.end.dateTime):null;
      const timeStr=s&&e?`${p2(s.getHours())}:${p2(s.getMinutes())} – ${p2(e.getHours())}:${p2(e.getMinutes())}`:'Journée';
      return`<div class="sched-evt">
        <div class="sched-dot" style="background:${evColor(ev)}"></div>
        <div class="sched-info">
          <div class="sched-title">${esc(ev.summary||'Sans titre')}</div>
          <div class="sched-time">${timeStr}</div>
        </div>
      </div>`;}).join('')}
  </div>`).join('')}
</div>`;}

function renderMiniMonth(d){
  const dates=D.monthDates(d);const today=new Date();
  const dn=['L','M','M','J','V','S','D'];
  return dn.map(n=>`<div class="cal-mini-d hd">${n}</div>`).join('')+
    dates.map(date=>`<div class="cal-mini-d${D.isToday(date)?' today':D.isSameDay(date,A.calDate)?' sel':''}"
      onclick="A.calDate=new Date(${date.getTime()});refreshCalSection()">${date.getDate()}</div>`).join('');
}

function renderEvtBlock(ev,idx,totalCols=7){
  const s=ev.start?.dateTime?new Date(ev.start.dateTime):null;
  const e=ev.end?.dateTime?new Date(ev.end.dateTime):null;
  if(!s||!e)return'';
  const top=(s.getHours()*60+s.getMinutes())/60*60;
  const h=Math.max(20,(e-s)/3600000*60);
  const color=evColor(ev);
  return`<div class="cal-evt" style="top:${top}px;height:${h}px;background:${color};color:#fff;opacity:.9">
    <div class="cal-evt-t">${esc(ev.summary||'Sans titre')}</div>
    <div class="cal-evt-s">${p2(s.getHours())}:${p2(s.getMinutes())}</div>
  </div>`;}

let evColorCache={};
function evColor(ev){
  const key=(ev.colorId||ev.organizer?.email||'default');
  if(evColorCache[key])return evColorCache[key];
  const colors=['#1a73e8','#0F9D58','#F4B400','#DB4437','#7986CB','#33B679','#039BE5','#E67C73'];
  const c=colors[Object.keys(evColorCache).length%colors.length];
  evColorCache[key]=c;return c;}

function initCalendar(){
  const scroll=document.getElementById('cal-scroll');
  if(scroll){const now=new Date();const offset=(now.getHours()*60+now.getMinutes())/60*60;
    scroll.scrollTop=Math.max(0,offset-120);}
  renderWeekEvents();}

async function renderWeekEvents(){
  if(!Cal.valid())return;
  const wdates=D.weekDates(A.calDate);
  const cols=document.querySelectorAll('.cal-dcol');
  cols.forEach((col,i)=>{
    const d=wdates[i];if(!d)return;
    const evts=Cal.cached(d);
    evts.forEach((ev,ei)=>{const block=renderEvtBlock(ev,ei);if(block)col.insertAdjacentHTML('beforeend',block);});});
  // Now line
  if(A.calView==='week'){
    const today=new Date();const wdates=D.weekDates(A.calDate);
    const todayIdx=wdates.findIndex(d=>D.isToday(d));
    if(todayIdx>=0){const col=cols[todayIdx];if(col){const top=(today.getHours()*60+today.getMinutes())/60*60;
      col.insertAdjacentHTML('beforeend',`<div class="cal-now-line" style="top:${top}px"><div class="cal-now-dot"></div></div>`);}}}}

window.calNavWeek=function(dir){
  if(A.calView==='month')A.calDate=D.addMonths(A.calDate,dir);
  else A.calDate=D.addDays(A.calDate,dir*7);
  refreshCalSection();};
window.calGoToday=function(){A.calDate=new Date();refreshCalSection();};
window.calSetView=function(v){A.calView=v;refreshCalSection();};
window.calMiniNav=function(dir){
  A.calMiniDate=D.addMonths(A.calMiniDate,dir);
  const grid=document.getElementById('cal-mini-grid');const title=document.getElementById('cal-mini-title');
  if(grid)grid.innerHTML=renderMiniMonth(A.calMiniDate);
  if(title)title.textContent=D.frenchMini(A.calMiniDate);};

window.calSync=async function(){
  if(!Cal.valid()){alert('Token expiré. Reconnectez-vous dans les Paramètres.');return;}
  const wdates=D.weekDates(A.calDate);
  const start=wdates[0];const end=D.addDays(wdates[6],1);
  await Cal.fetchRange(start,end);
  refreshCalSection();
  alert('Synchronisation terminée.');};

function refreshCalSection(){

function renderRecap(){
  const type=A.recapType;
  const today=new Date();let dates=[];let ctxLabel='';let ctxDates='';
  if(type==='day'){dates=[today];ctxLabel=D.frenchLong(today);ctxDates=D.key(today);}
  else if(type==='week'){dates=D.weekDates(today);ctxLabel='Semaine en cours';
    ctxDates=`${D.key(dates[0])} → ${D.key(dates[6])}`;}
  else{const first=new Date(today.getFullYear(),today.getMonth(),1);
    const last=new Date(today.getFullYear(),today.getMonth()+1,0);
    const allDays=[];let d=new Date(first);while(d<=last){allDays.push(new Date(d));d=D.addDays(d,1);}
    dates=allDays;ctxLabel=D.frenchMonthYear(today);ctxDates=D.monthKey(today);}
  const logCount=Log.allContent(dates).length;
  const calCount=Cal.cachedRange(dates[0],D.addDays(dates[dates.length-1],1)).length;
  const hist=Recap.history(type);
  return`
<div class="recap-body">
  <div class="seg">
    <button class="seg-btn${type==='day'?' on':''}" onclick="recapSetType('day')">Jour</button>
    <button class="seg-btn${type==='week'?' on':''}" onclick="recapSetType('week')">Semaine</button>
    <button class="seg-btn${type==='month'?' on':''}" onclick="recapSetType('month')">Mois</button>
  </div>
  <div class="recap-ctx">
    <div class="recap-ctx-title">${ctxLabel}</div>
    <div class="recap-ctx-row"><span class="recap-ctx-label">Période</span><span class="recap-ctx-val">${ctxDates}</span></div>
    <div class="recap-ctx-row"><span class="recap-ctx-label">Slots remplis</span><span class="recap-ctx-val">${logCount}</span></div>
    <div class="recap-ctx-row"><span class="recap-ctx-label">Événements calendrier</span><span class="recap-ctx-val">${calCount}</span></div>
  </div>
  ${A.recapLoading?`<div class="loading"><div class="spin"></div><span>Analyse en cours...</span></div>`:''}
  ${A.recapText&&!A.recapLoading?`<div class="recap-result" id="recap-result">${formatRecapText(A.recapText)}</div>`:''}
  <button class="btn btn-blue" onclick="triggerRecap()" ${A.recapLoading?'disabled':''}>
    ${A.recapLoading?'<span class="spin" style="width:18px;height:18px;border-width:2px"></span>':''}
    Analyser
  </button>
  ${hist.length>0?`
  <div class="recap-hist-hd">Historique</div>
  ${hist.map(h=>`
  <div class="recap-hist-item" onclick="loadRecap('${h.key}')">
    <div>
      <div class="recap-hist-date">${formatRecapDate(h)}</div>
      <div class="recap-hist-time">${new Date(h.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>
    <div class="chevron"></div>
  </div>`).join('')}`:''}
  <div style="height:40px"></div>
</div>`;}

function formatRecapDate(h){
  const d=h.date;if(!d)return'—';
  if(h.type==='month')return `Mois : ${d}`;
  if(h.type==='week')return `Semaine du ${d}`;
  return d;}

function formatRecapText(text){
  if(!text)return'';
  let html=text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^(\d+\/\s*[A-ZÀÂÉÈÊËÎÏÔÙÛÜŸÇŒÆ][A-ZÀÂÉÈÊËÎÏÔÙÛÜŸÇŒÆa-záàâéèêëîïôùûüÿçœæ\s\-'—]+)/gm,'<h3>$1</h3>')
    .replace(/\n\n+/g,'</p><p>')
    .replace(/\n/g,'<br>');
  return`<p>${html}</p>`;}

window.recapSetType=function(t){
  A.recapType=t;A.recapText=null;A.recapLoading=false;A.recapViewKey=null;
  refreshRecapSection();};

window.triggerRecap=async function(){
  const today=new Date();let dates=[];
  if(A.recapType==='day')dates=[today];
  else if(A.recapType==='week')dates=D.weekDates(today);
  else{const first=new Date(today.getFullYear(),today.getMonth(),1);
    const last=new Date(today.getFullYear(),today.getMonth()+1,0);
    let d=new Date(first);while(d<=last){dates.push(new Date(d));d=D.addDays(d,1);}}
  A.recapLoading=true;A.recapText=null;refreshRecapSection();
  try{
    const prompt=Recap.buildPrompt(A.recapType,dates);
    const result=await AI.analyze(prompt);
    A.recapText=result;A.recapLoading=false;
    Recap.save(A.recapType,today,result);
    refreshRecapSection();}
  catch(e){A.recapLoading=false;refreshRecapSection();alert('Erreur: '+e.message);}};

window.loadRecap=function(key){
  const r=Recap.get(key);if(!r)return;
  A.recapText=r.content;A.recapViewKey=key;A.recapLoading=false;
  refreshRecapSection();};

function refreshRecapSection(){
  if(A.mobile()){const main=document.getElementById('screen-main');if(main)main.innerHTML=renderRecap();}
  else{const sec=document.getElementById('sec-recap');if(sec){sec.innerHTML=renderRecap();sec.dataset.loaded='1';}}}

window.exportData=function(){
  const allData={};S.keys().forEach(k=>{allData[k]=S.get(k);});
  const json=JSON.stringify(allData,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const date=D.key(new Date());
  if(navigator.share&&A.mobile()){
    const file=new File([blob],`lifeos_export_${date}.json`,{type:'application/json'});
    navigator.share({files:[file],title:'Life OS Export'}).catch(()=>{downloadBlob(url,date);});}
  else{downloadBlob(url,date);}};

function downloadBlob(url,date){
  const a=document.createElement('a');a.href=url;a.download=`lifeos_export_${date}.json`;
  a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);}

window.importData=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{const data=JSON.parse(e.target.result);
      Object.entries(data).forEach(([k,v])=>S.set(k,v));
      alert(`Import réussi — ${Object.keys(data).length} clés restaurées.`);
      refreshSettingsSection();}
    catch(err){alert('Erreur lors de l\'import: fichier JSON invalide.');}
  };reader.readAsText(file);};

  });
  // visualViewport for keyboard avoidance on log
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',()=>{
      const active=document.activeElement;
      if(active&&active.classList.contains('log-inp')){
        active.scrollIntoView({behavior:'smooth',block:'center'});}
    });}
}

document.addEventListener('DOMContentLoaded',init);
// Also handle direct script execution (file:// or already parsed)
if(document.readyState==='complete'||document.readyState==='interactive'){init();}
</script>
</body>
